<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Gallery</h1>
    <button id="theme-toggle" aria-label="Toggle dark/light mode">◑</button>
  </header>
  <div id="grid"></div>

  <aside class="description-pane" id="description-pane" aria-label="Piece description">
    <button class="pane-close" id="pane-close" aria-label="Close">×</button>
    <h2 class="pane-title" id="pane-title"></h2>
    <p class="pane-meta" id="pane-meta"></p>
    <div class="pane-description" id="pane-description"></div>
  </aside>

  <script>
    function renderMarkdown(text) {
      const esc = s => s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      const fmt = s => esc(s)
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/`([^`]+)`/g, '<code>$1</code>');
      const out = [];
      let list = [], code = [], inCode = false;
      const flushList = () => {
        if (list.length) {
          out.push('<ul>' + list.map(l => `<li>${l}</li>`).join('') + '</ul>');
          list = [];
        }
      };
      const flushCode = () => {
        if (code.length) {
          out.push(`<pre><code>${esc(code.join('\n'))}</code></pre>`);
          code = [];
        }
      };
      for (const line of text.split('\n')) {
        if (line.startsWith('```')) {
          if (inCode) { flushCode(); inCode = false; }
          else { flushList(); inCode = true; }
        } else if (inCode) {
          code.push(line);
        } else if (line.trim() === '') {
          flushList();
        } else if (/^#+\s/.test(line)) {
          flushList();
          out.push(`<h3>${fmt(line.replace(/^#+\s+/, ''))}</h3>`);
        } else if (line.startsWith('- ')) {
          list.push(fmt(line.slice(2)));
        } else if (/^\|[\s:|-]+\|/.test(line)) {
          // table separator row — skip
        } else if (line.startsWith('|')) {
          flushList();
          const cells = line.split('|').slice(1, -1).map(c => fmt(c.trim())).filter(Boolean);
          if (cells.length) out.push(`<p>${cells.join(' · ')}</p>`);
        } else {
          flushList();
          out.push(`<p>${fmt(line)}</p>`);
        }
      }
      flushList();
      if (inCode) flushCode();
      return out.join('\n');
    }

    // localStorage key for theme preference: "theme"
    (function () {
      const saved = localStorage.getItem('theme');
      if (saved) document.documentElement.dataset.theme = saved;
    })();

    document.getElementById('theme-toggle').addEventListener('click', function () {
      const current = document.documentElement.dataset.theme;
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.dataset.theme = next;
      localStorage.setItem('theme', next);
    });

    let focusedIdx = -1;

    function getCards() {
      return Array.from(document.querySelectorAll('.card'));
    }

    async function openPane(piece) {
      const pane = document.getElementById('description-pane');
      document.getElementById('pane-title').textContent = piece.title;
      document.getElementById('pane-meta').textContent =
        [piece.technique, piece.year].filter(Boolean).join(' · ');
      const descEl = document.getElementById('pane-description');
      descEl.innerHTML = renderMarkdown(piece.description || piece.tagline || '');
      pane.classList.add('open');
      try {
        const res = await fetch(piece.path + '/README.md');
        if (res.ok) descEl.innerHTML = renderMarkdown(await res.text());
      } catch (_) {}
    }

    function closePane() {
      document.getElementById('description-pane').classList.remove('open');
    }

    document.addEventListener('keydown', function (e) {
      const cards = getCards();
      if (!cards.length) return;

      if (e.key === 'Escape') {
        const pane = document.getElementById('description-pane');
        if (pane.classList.contains('open')) {
          closePane();
          return;
        }
        if (focusedIdx >= 0) {
          cards[focusedIdx].blur();
          focusedIdx = -1;
        }
      } else if (e.key === 'i' || e.key === 'I') {
        if (focusedIdx >= 0 && window._galleryPieces) {
          openPane(window._galleryPieces[focusedIdx]);
        }
      } else if (e.key === 'ArrowRight') {
        focusedIdx = Math.min(focusedIdx + 1, cards.length - 1);
        cards[focusedIdx].focus();
      } else if (e.key === 'ArrowLeft') {
        focusedIdx = Math.max(focusedIdx - 1, 0);
        cards[focusedIdx].focus();
      }
    });

    document.addEventListener('focusin', function (e) {
      const cards = getCards();
      const idx = cards.indexOf(e.target);
      if (idx !== -1) focusedIdx = idx;
    });

    async function init() {
      const grid = document.getElementById('grid');

      if (window.location.protocol === 'file:') {
        grid.innerHTML = `
          <div id="empty-state">
            <p><strong>Local File Restriction:</strong> Browsers block <code>fetch()</code> requests on <code>file://</code> URLs for security.</p>
            <p>To view the gallery, start a local server in this directory:</p>
            <code style="display:block; background:rgba(128,128,128,0.1); padding:1rem; margin:1rem 0; border-radius:4px;">python3 -m http.server</code>
            <p>Then open <code>localhost:8000</code> in your browser.</p>
          </div>
        `;
        return;
      }

      let pieces;

      try {
        const res = await fetch('./pieces.json');
        if (!res.ok) throw new Error(`Fetch failed: ${res.status} ${res.statusText}`);
        pieces = await res.json();
      } catch (err) {
        console.error('Gallery init error:', err);
        grid.innerHTML = `<p id="empty-state">Could not load gallery data. (${err.message})</p>`;
        return;
      }

      if (!Array.isArray(pieces) || !pieces.length) {
        const msg = document.createElement('p');
        msg.id = 'empty-state';
        msg.textContent = 'No pieces yet — the gallery is growing.';
        grid.appendChild(msg);
        return;
      }

      window._galleryPieces = pieces;

      for (let i = 0; i < pieces.length; i++) {
        const piece = pieces[i];
        const card = document.createElement('a');
        card.className = 'card';
        card.href = piece.path + '/index.html';
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        card.style.position = 'relative';

        const img = document.createElement('img');
        img.src = piece.thumbnail;
        img.alt = piece.title;
        img.loading = 'lazy';

        const body = document.createElement('div');
        body.className = 'card-body';

        const title = document.createElement('h2');
        title.className = 'card-title';
        title.textContent = piece.title;

        const tagline = document.createElement('p');
        tagline.className = 'card-tagline';
        tagline.textContent = piece.tagline;

        const infoBtn = document.createElement('button');
        infoBtn.className = 'info-btn';
        infoBtn.setAttribute('aria-label', 'About this piece');
        infoBtn.textContent = 'ℹ';
        infoBtn.addEventListener('click', function (e) {
          e.preventDefault();
          e.stopPropagation();
          openPane(piece);
        });

        body.appendChild(title);
        body.appendChild(tagline);
        card.appendChild(img);
        card.appendChild(body);
        card.appendChild(infoBtn);
        grid.appendChild(card);
      }
    }

    document.getElementById('pane-close').addEventListener('click', closePane);

    init();
  </script>
</body>
</html>
