<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Letters in Motion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f5f0eb; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    canvas { display: block; width: 100vmin; height: 100vmin; }
  </style>
</head>
<body>
<canvas id="canvas" width="800" height="800"></canvas>
<script>
const W = 800, H = 800;
const WORD = 'DRIFT';
const BG = '#f5f0eb';
const DARK = '#1a1a2e';
const ACCENT = '#e94560';
const ACCENT_FRAC = 0.12;
const SAMPLE_STEP = 3;
const ASSEMBLE_MS = 3000;
const HOLD_MS = 600;
const DISPERSE_MS = 3000;

// Render the word into an offscreen canvas, sample every SAMPLE_STEP pixels,
// and return an array of [x, y] pairs for every dark pixel found.
function sampleTextPixels() {
  const off = document.createElement('canvas');
  off.width = W;
  off.height = H;
  const cx = off.getContext('2d');
  cx.fillStyle = '#ffffff';
  cx.fillRect(0, 0, W, H);
  cx.fillStyle = '#000000';
  cx.font = 'bold 220px sans-serif';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(WORD, W / 2, H / 2);
  const d = cx.getImageData(0, 0, W, H).data;
  const pts = [];
  for (let y = 0; y < H; y += SAMPLE_STEP) {
    for (let x = 0; x < W; x += SAMPLE_STEP) {
      if (d[(y * W + x) * 4] < 128) pts.push([x, y]);
    }
  }
  // Shuffle so each particle gets an unpredictable target
  for (let i = pts.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pts[i], pts[j]] = [pts[j], pts[i]];
  }
  return pts;
}

const targets = sampleTextPixels();
const N = targets.length;

const px = new Float32Array(N), py = new Float32Array(N);
const pvx = new Float32Array(N), pvy = new Float32Array(N);
const ptx = new Float32Array(N), pty = new Float32Array(N);
const pWobble = new Float32Array(N);
const pAccent = new Uint8Array(N);

for (let i = 0; i < N; i++) {
  px[i] = Math.random() * W;
  py[i] = Math.random() * H;
  ptx[i] = targets[i][0];
  pty[i] = targets[i][1];
  pWobble[i] = Math.random() * Math.PI * 2;
  pAccent[i] = Math.random() < ACCENT_FRAC ? 1 : 0;
}

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let phase = 'assembling';
let phaseT = 0;
let lastNow = null;

function resetAssemble() {
  for (let i = 0; i < N; i++) {
    px[i] = Math.random() * W;
    py[i] = Math.random() * H;
    pvx[i] = pvy[i] = 0;
  }
}

function startDisperse() {
  for (let i = 0; i < N; i++) {
    pvx[i] = (Math.random() - 0.5) * 8;
    pvy[i] = (Math.random() - 0.5) * 8;
  }
}

function frame(now) {
  if (lastNow === null) lastNow = now;
  // Cap delta so backgrounded tabs don't burst on resume
  const dt = Math.min(now - lastNow, 50);
  lastNow = now;
  phaseT += dt;

  if      (phase === 'assembling' && phaseT >= ASSEMBLE_MS) { phase = 'holding';    phaseT = 0; }
  else if (phase === 'holding'    && phaseT >= HOLD_MS)     { phase = 'dispersing'; phaseT = 0; startDisperse(); }
  else if (phase === 'dispersing' && phaseT >= DISPERSE_MS) { phase = 'assembling'; phaseT = 0; resetAssemble(); }

  ctx.fillStyle = BG;
  ctx.fillRect(0, 0, W, H);

  const t = now * 0.001;

  for (let i = 0; i < N; i++) {
    const col = pAccent[i] ? ACCENT : DARK;
    let drawX, drawY, alpha;

    if (phase === 'assembling') {
      // Lerp toward target; wobble amplitude shrinks as particles converge
      px[i] += (ptx[i] - px[i]) * 0.05;
      py[i] += (pty[i] - py[i]) * 0.05;
      const wamp = (1 - phaseT / ASSEMBLE_MS) * 6;
      drawX = px[i] + Math.sin(t * 2.3 + pWobble[i]) * wamp;
      drawY = py[i] + Math.cos(t * 1.7 + pWobble[i]) * wamp;
      alpha = 0.85;

    } else if (phase === 'holding') {
      drawX = ptx[i] + Math.sin(t * 2.3 + pWobble[i]) * 1.5;
      drawY = pty[i] + Math.cos(t * 1.7 + pWobble[i]) * 1.5;
      alpha = 0.9;

    } else {
      // Accelerate outward then fade
      pvx[i] *= 1.04;
      pvy[i] *= 1.04;
      px[i] += pvx[i];
      py[i] += pvy[i];
      drawX = px[i];
      drawY = py[i];
      alpha = Math.max(0, 1 - phaseT / DISPERSE_MS) * 0.9;
    }

    ctx.globalAlpha = alpha;
    ctx.fillStyle = col;
    ctx.fillRect(drawX, drawY, 2, 2);
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
