<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#f5ede0"/>
  <g stroke="#1a1007" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Trunk -->
    <line x1="200" y1="385" x2="200" y2="295" stroke-width="3"/>
    <!-- Level 1: three branches from top of trunk -->
    <line x1="200" y1="295" x2="132" y2="225" stroke-width="2.2"/>
    <line x1="200" y1="295" x2="200" y2="222" stroke-width="2.2"/>
    <line x1="200" y1="295" x2="268" y2="225" stroke-width="2.2"/>
    <!-- Level 2: three sub-branches from left branch (132,225) -->
    <line x1="132" y1="225" x2="82" y2="178" stroke-width="1.6"/>
    <line x1="132" y1="225" x2="132" y2="175" stroke-width="1.6"/>
    <line x1="132" y1="225" x2="182" y2="178" stroke-width="1.6"/>
    <!-- Level 2: three sub-branches from center branch (200,222) -->
    <line x1="200" y1="222" x2="152" y2="175" stroke-width="1.6"/>
    <line x1="200" y1="222" x2="200" y2="172" stroke-width="1.6"/>
    <line x1="200" y1="222" x2="248" y2="175" stroke-width="1.6"/>
    <!-- Level 2: three sub-branches from right branch (268,225) -->
    <line x1="268" y1="225" x2="218" y2="178" stroke-width="1.6"/>
    <line x1="268" y1="225" x2="268" y2="175" stroke-width="1.6"/>
    <line x1="268" y1="225" x2="318" y2="178" stroke-width="1.6"/>
    <!-- Level 3: fine branches from level-2 endpoints -->
    <!-- From left-left (82,178) -->
    <line x1="82" y1="178" x2="50" y2="147" stroke-width="1"/>
    <line x1="82" y1="178" x2="82" y2="144" stroke-width="1"/>
    <line x1="82" y1="178" x2="114" y2="147" stroke-width="1"/>
    <!-- From left-center (132,175) -->
    <line x1="132" y1="175" x2="100" y2="144" stroke-width="1"/>
    <line x1="132" y1="175" x2="132" y2="141" stroke-width="1"/>
    <line x1="132" y1="175" x2="164" y2="144" stroke-width="1"/>
    <!-- From left-right (182,178) -->
    <line x1="182" y1="178" x2="150" y2="147" stroke-width="1"/>
    <line x1="182" y1="178" x2="182" y2="144" stroke-width="1"/>
    <line x1="182" y1="178" x2="214" y2="147" stroke-width="1"/>
    <!-- From center-left (152,175) -->
    <line x1="152" y1="175" x2="120" y2="144" stroke-width="1"/>
    <line x1="152" y1="175" x2="152" y2="141" stroke-width="1"/>
    <line x1="152" y1="175" x2="184" y2="144" stroke-width="1"/>
    <!-- From center-center (200,172) -->
    <line x1="200" y1="172" x2="168" y2="141" stroke-width="1"/>
    <line x1="200" y1="172" x2="200" y2="138" stroke-width="1"/>
    <line x1="200" y1="172" x2="232" y2="141" stroke-width="1"/>
    <!-- From center-right (248,175) -->
    <line x1="248" y1="175" x2="216" y2="144" stroke-width="1"/>
    <line x1="248" y1="175" x2="248" y2="141" stroke-width="1"/>
    <line x1="248" y1="175" x2="280" y2="144" stroke-width="1"/>
    <!-- From right-left (218,178) -->
    <line x1="218" y1="178" x2="186" y2="147" stroke-width="1"/>
    <line x1="218" y1="178" x2="218" y2="144" stroke-width="1"/>
    <line x1="218" y1="178" x2="250" y2="147" stroke-width="1"/>
    <!-- From right-center (268,175) -->
    <line x1="268" y1="175" x2="236" y2="144" stroke-width="1"/>
    <line x1="268" y1="175" x2="268" y2="141" stroke-width="1"/>
    <line x1="268" y1="175" x2="300" y2="144" stroke-width="1"/>
    <!-- From right-right (318,178) -->
    <line x1="318" y1="178" x2="286" y2="147" stroke-width="1"/>
    <line x1="318" y1="178" x2="318" y2="144" stroke-width="1"/>
    <line x1="318" y1="178" x2="350" y2="147" stroke-width="1"/>
    <!-- Level 4: hairline tips (central column only for density) -->
    <line x1="200" y1="138" x2="178" y2="112" stroke-width="0.6"/>
    <line x1="200" y1="138" x2="200" y2="109" stroke-width="0.6"/>
    <line x1="200" y1="138" x2="222" y2="112" stroke-width="0.6"/>
    <line x1="132" y1="141" x2="110" y2="115" stroke-width="0.6"/>
    <line x1="132" y1="141" x2="132" y2="112" stroke-width="0.6"/>
    <line x1="132" y1="141" x2="154" y2="115" stroke-width="0.6"/>
    <line x1="268" y1="141" x2="246" y2="115" stroke-width="0.6"/>
    <line x1="268" y1="141" x2="268" y2="112" stroke-width="0.6"/>
    <line x1="268" y1="141" x2="290" y2="115" stroke-width="0.6"/>
    <line x1="82" y1="144" x2="60" y2="118" stroke-width="0.5"/>
    <line x1="82" y1="144" x2="82" y2="115" stroke-width="0.5"/>
    <line x1="318" y1="144" x2="296" y2="118" stroke-width="0.5"/>
    <line x1="318" y1="144" x2="318" y2="115" stroke-width="0.5"/>
  </g>
</svg>
