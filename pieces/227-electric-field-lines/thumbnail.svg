<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#0a0a14"/>

  <!-- Equipotential ovals around positive charge (teal dashed) -->
  <ellipse cx="140" cy="150" rx="20" ry="20" fill="none" stroke="#208888" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.45"/>
  <ellipse cx="140" cy="150" rx="42" ry="38" fill="none" stroke="#208888" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>

  <!-- Equipotential ovals around negative charge (teal dashed) -->
  <ellipse cx="260" cy="150" rx="20" ry="20" fill="none" stroke="#208888" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.45"/>
  <ellipse cx="260" cy="150" rx="42" ry="38" fill="none" stroke="#208888" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.4"/>

  <!-- Outer equipotential encircling both -->
  <path d="M200,45 C310,45 375,95 375,150 C375,205 310,255 200,255 C90,255 25,205 25,150 C25,95 90,45 200,45Z"
        fill="none" stroke="#208888" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.3"/>

  <!-- Middle equipotential (hourglass / figure-8 near midpoint) -->
  <path d="M200,100 C230,100 240,125 240,150 C240,175 230,200 200,200 C170,200 160,175 160,150 C160,125 170,100 200,100Z"
        fill="none" stroke="#208888" stroke-width="0.8" stroke-dasharray="3,4" opacity="0.35"/>

  <!-- Field lines from + to - (warm gold) -->
  <!-- Direct horizontal line -->
  <path d="M153,150 L247,150" stroke="#d4a030" stroke-width="1.3" opacity="0.9" fill="none"/>

  <!-- Upward arcs -->
  <path d="M149,142 Q200,110 251,142" stroke="#d4a030" stroke-width="1.2" opacity="0.85" fill="none"/>
  <path d="M147,133 Q200,82  253,133" stroke="#d4a030" stroke-width="1.1" opacity="0.75" fill="none"/>
  <path d="M144,122 Q200,48  256,122" stroke="#d4a030" stroke-width="1.0" opacity="0.6"  fill="none"/>
  <path d="M141,112 Q200,18  259,112" stroke="#d4a030" stroke-width="0.9" opacity="0.45" fill="none"/>

  <!-- Downward arcs -->
  <path d="M149,158 Q200,190 251,158" stroke="#d4a030" stroke-width="1.2" opacity="0.85" fill="none"/>
  <path d="M147,167 Q200,218 253,167" stroke="#d4a030" stroke-width="1.1" opacity="0.75" fill="none"/>
  <path d="M144,178 Q200,252 256,178" stroke="#d4a030" stroke-width="1.0" opacity="0.6"  fill="none"/>
  <path d="M141,188 Q200,282 259,188" stroke="#d4a030" stroke-width="0.9" opacity="0.45" fill="none"/>

  <!-- Positive charge (red) -->
  <circle cx="140" cy="150" r="12" fill="#e04040" stroke="#ff8080" stroke-width="1.5"/>
  <text x="140" y="155" fill="white" font-size="15" font-family="system-ui,sans-serif" font-weight="bold" text-anchor="middle">+</text>

  <!-- Negative charge (blue) -->
  <circle cx="260" cy="150" r="12" fill="#4080e0" stroke="#80b0ff" stroke-width="1.5"/>
  <text x="260" y="155" fill="white" font-size="15" font-family="system-ui,sans-serif" font-weight="bold" text-anchor="middle">−</text>

  <!-- Title text -->
  <text x="200" y="279" fill="#c08030" font-size="11" font-family="system-ui,sans-serif"
        text-anchor="middle" letter-spacing="0.1em" opacity="0.8">ELECTRIC FIELD LINES</text>
  <text x="200" y="293" fill="#206060" font-size="9" font-family="system-ui,sans-serif"
        text-anchor="middle" letter-spacing="0.07em" opacity="0.6">Coulomb · Superposition · Equipotentials</text>
</svg>
