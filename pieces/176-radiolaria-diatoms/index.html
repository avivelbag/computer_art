<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Radiolaria &amp; Diatom Morphology</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070d1a;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh;overflow:hidden}
svg{width:min(100vw,100vh);height:min(100vw,100vh)}
</style>
</head>
<body>
<svg id="scene" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="800" fill="#070d1a"/>
</svg>
<script>
(function(){
'use strict';

const NS='http://www.w3.org/2000/svg';
const scene=document.getElementById('scene');
const BONE='#e8e0d0';
const GOLD='#d4b483';
const ACCENT='#4dd9c0';

// 7 organism definitions: each specifies center, base radius, polar equation
// params (n,m,a,b,c), structural params, and animation (dur in seconds, dir ±1).
// r(θ) = R*(a + b*sin(n*θ) + c*sin(m*θ)); n,m ∈ {3,4,6,8,12,16,24}.
const ORGS=[
  {cx:400,cy:400,R:90, n:12,m:6, a:0.55,b:0.30,c:0.15,shells:3,spines:12,lattice:true, dur:45,dir:1, stroke:BONE},
  {cx:170,cy:165,R:72, n:16,m:8, a:0.60,b:0.28,c:0.12,shells:2,spines:16,lattice:false,dur:38,dir:-1,stroke:GOLD},
  {cx:638,cy:192,R:75, n:6, m:3, a:0.65,b:0.25,c:0.10,shells:3,spines:6, lattice:true, dur:52,dir:1, stroke:BONE},
  {cx:665,cy:618,R:82, n:8, m:4, a:0.58,b:0.32,c:0.10,shells:3,spines:8, lattice:true, dur:42,dir:-1,stroke:GOLD},
  {cx:152,cy:608,R:65, n:24,m:12,a:0.62,b:0.28,c:0.10,shells:2,spines:24,lattice:false,dur:35,dir:1, stroke:BONE},
  {cx:612,cy:418,R:52, n:3, m:6, a:0.60,b:0.30,c:0.10,shells:2,spines:3, lattice:false,dur:60,dir:-1,stroke:GOLD},
  {cx:308,cy:182,R:52, n:4, m:8, a:0.58,b:0.30,c:0.12,shells:2,spines:4, lattice:true, dur:48,dir:1, stroke:BONE},
];

function polarPts(cx,cy,R,n,m,a,b,c,steps){
  const pts=[];
  for(let i=0;i<steps;i++){
    const th=(i/steps)*2*Math.PI;
    const r=R*(a+b*Math.sin(n*th)+c*Math.sin(m*th));
    pts.push([cx+r*Math.cos(th),cy+r*Math.sin(th)]);
  }
  return pts;
}

function pathFromPts(pts){
  return 'M'+pts.map(([x,y])=>x.toFixed(2)+','+y.toFixed(2)).join('L')+'Z';
}

function el(tag,attrs){
  const e=document.createElementNS(NS,tag);
  for(const[k,v]of Object.entries(attrs)) e.setAttribute(k,v);
  return e;
}

// Build one radiolarian/diatom organism as an SVG <g> with SMIL rotation.
function buildOrg(org){
  const{cx,cy,R,n,m,a,b,c,shells,spines,lattice,dur,dir,stroke}=org;
  const g=el('g',{});
  const steps=Math.max(720,n*60);

  // Concentric shells: scaled-down copies of the body outline at even intervals
  for(let s=1;s<=shells;s++){
    const scale=s/(shells+1);
    const pts=polarPts(cx,cy,R*scale,n,m,a,b,c,steps);
    const sw=s===shells?0.8:0.5;
    g.appendChild(el('path',{d:pathFromPts(pts),stroke,fill:'none','stroke-width':sw,'stroke-linejoin':'round'}));
  }

  // Outer body outline at full R
  {
    const pts=polarPts(cx,cy,R,n,m,a,b,c,steps);
    g.appendChild(el('path',{d:pathFromPts(pts),stroke,fill:'none','stroke-width':1.4,'stroke-linejoin':'round'}));
  }

  // Spines: radial lines from 0.75R to 1.25R with small diamond tips
  for(let k=0;k<spines;k++){
    const th=(2*Math.PI*k)/spines;
    const co=Math.cos(th),si=Math.sin(th);
    const x1=cx+R*0.75*co, y1=cy+R*0.75*si;
    const x2=cx+R*1.25*co, y2=cy+R*1.25*si;
    g.appendChild(el('line',{x1:x1.toFixed(2),y1:y1.toFixed(2),x2:x2.toFixed(2),y2:y2.toFixed(2),stroke,'stroke-width':0.7,'stroke-linecap':'round'}));
    const tip=R*0.055;
    const tx=x2+tip*co,        ty=y2+tip*si;
    const lx=x2+tip*0.5*(-si), ly=y2+tip*0.5*co;
    const rx=x2-tip*0.5*(-si), ry=y2-tip*0.5*co;
    const bx=x2-tip*0.35*co,   by=y2-tip*0.35*si;
    const dpts=`${tx.toFixed(2)},${ty.toFixed(2)} ${lx.toFixed(2)},${ly.toFixed(2)} ${bx.toFixed(2)},${by.toFixed(2)} ${rx.toFixed(2)},${ry.toFixed(2)}`;
    g.appendChild(el('polygon',{points:dpts,stroke,fill:stroke,'stroke-width':0.4}));
  }

  // Inner lattice: 2N fine radial spokes + 2 small concentric rings
  if(lattice){
    const latSpokes=n*2;
    for(let k=0;k<latSpokes;k++){
      const th=(2*Math.PI*k)/latSpokes;
      const x2=cx+R*0.38*Math.cos(th), y2=cy+R*0.38*Math.sin(th);
      g.appendChild(el('line',{x1:cx.toFixed(2),y1:cy.toFixed(2),x2:x2.toFixed(2),y2:y2.toFixed(2),stroke,'stroke-width':0.3,'stroke-linecap':'round'}));
    }
    g.appendChild(el('circle',{cx:cx.toFixed(2),cy:cy.toFixed(2),r:(R*0.38).toFixed(2),stroke,fill:'none','stroke-width':0.35}));
    g.appendChild(el('circle',{cx:cx.toFixed(2),cy:cy.toFixed(2),r:(R*0.25).toFixed(2),stroke,fill:'none','stroke-width':0.3}));
  }

  // Nucleus: accent ring + filled dot at center
  g.appendChild(el('circle',{cx:cx.toFixed(2),cy:cy.toFixed(2),r:(R*0.13).toFixed(2),stroke:ACCENT,fill:'none','stroke-width':0.9}));
  g.appendChild(el('circle',{cx:cx.toFixed(2),cy:cy.toFixed(2),r:(R*0.06).toFixed(2),stroke:'none',fill:ACCENT}));

  // SMIL rotation: dir=1 → CW, dir=-1 → CCW; dur >= 20 s per acceptance criterion
  g.appendChild(el('animateTransform',{
    attributeName:'transform',
    type:'rotate',
    from:`0 ${cx} ${cy}`,
    to:`${dir*360} ${cx} ${cy}`,
    dur:`${dur}s`,
    repeatCount:'indefinite',
  }));

  return g;
}

ORGS.forEach(org=>scene.appendChild(buildOrg(org)));

})();
</script>
</body>
</html>
