<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <radialGradient id="mbg" cx="38%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#1a0a40"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>
    <radialGradient id="jbg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0a0830"/>
      <stop offset="100%" stop-color="#060610"/>
    </radialGradient>
    <!-- Mandelbrot-like blob colours -->
    <linearGradient id="halo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#4040c0" stop-opacity="0.8"/>
      <stop offset="40%"  stop-color="#c06000" stop-opacity="0.9"/>
      <stop offset="70%"  stop-color="#008080" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#800080" stop-opacity="0.6"/>
    </linearGradient>
    <linearGradient id="jhalo" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#6030c0" stop-opacity="0.7"/>
      <stop offset="50%"  stop-color="#20a080" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#c04080" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#060610"/>

  <!-- Left panel: Mandelbrot schematic -->
  <rect x="0" y="0" width="267" height="300" fill="url(#mbg)"/>

  <!-- Outer coloured halo rings suggesting iteration bands -->
  <ellipse cx="120" cy="150" rx="108" ry="98" fill="none" stroke="#4040c0" stroke-width="22" stroke-opacity="0.35"/>
  <ellipse cx="120" cy="150" rx="88"  ry="78" fill="none" stroke="#c06000" stroke-width="18" stroke-opacity="0.40"/>
  <ellipse cx="120" cy="150" rx="68"  ry="58" fill="none" stroke="#008080" stroke-width="14" stroke-opacity="0.45"/>
  <ellipse cx="120" cy="150" rx="50"  ry="42" fill="none" stroke="#800080" stroke-width="10" stroke-opacity="0.50"/>
  <ellipse cx="120" cy="150" rx="34"  ry="28" fill="none" stroke="#4080c0" stroke-width="7"  stroke-opacity="0.55"/>

  <!-- Main cardioid (approximate) -->
  <path d="M150,150 C150,120 140,100 120,100 C90,100 80,125 85,150 C80,175 90,200 120,200 C140,200 150,180 150,150 Z"
        fill="#000010" stroke="#2020a0" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Period-2 bulb -->
  <circle cx="80" cy="150" r="18" fill="#000010" stroke="#2020a0" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Divider -->
  <line x1="267" y1="0" x2="267" y2="300" stroke="#14142a" stroke-width="2"/>

  <!-- Right panel: Julia schematic -->
  <rect x="267" y="0" width="133" height="300" fill="url(#jbg)"/>

  <!-- Julia label strip -->
  <rect x="267" y="0" width="133" height="22" fill="#0a0a1a"/>
  <text x="333" y="14" text-anchor="middle" font-size="8" font-family="system-ui,sans-serif"
        fill="#7060c8" letter-spacing="0.1em" font-weight="700">JULIA SET</text>

  <!-- Julia set suggestion: dendritic coloured rings -->
  <ellipse cx="333" cy="163" rx="52" ry="52" fill="none" stroke="#6030c0" stroke-width="16" stroke-opacity="0.3"/>
  <ellipse cx="333" cy="163" rx="40" ry="40" fill="none" stroke="#20a080" stroke-width="12" stroke-opacity="0.35"/>
  <ellipse cx="333" cy="163" rx="28" ry="28" fill="none" stroke="#c04080" stroke-width="8"  stroke-opacity="0.40"/>
  <ellipse cx="333" cy="163" rx="16" ry="16" fill="none" stroke="#8060f0" stroke-width="5"  stroke-opacity="0.50"/>
  <circle  cx="333" cy="163" r="6"  fill="#000018"/>

  <!-- Orbit trace hint on Mandelbrot side -->
  <circle cx="148" cy="128" r="3" fill="#c8b8f0" opacity="0.9"/>
  <polyline points="120,150 130,138 140,130 148,128 152,124 158,118 165,108"
            fill="none" stroke="#c8b8f0" stroke-width="1.2" stroke-opacity="0.5"/>

  <!-- Title text -->
  <text x="133" y="285" text-anchor="middle" font-size="10" font-family="system-ui,sans-serif"
        fill="#c8b8f0" letter-spacing="0.04em" font-weight="700">MANDELBROT + JULIA EXPLORER</text>
</svg>
