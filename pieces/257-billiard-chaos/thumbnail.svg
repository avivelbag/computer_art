<svg xmlns="http://www.w3.org/2000/svg" width="900" height="450" viewBox="0 0 900 450">
  <rect width="900" height="450" fill="#06060e"/>

  <!-- Square table outline -->
  <rect x="30" y="45" width="360" height="360" fill="none" stroke="rgba(200,200,220,0.55)" stroke-width="1.5"/>

  <!-- Stadium table outline -->
  <path d="M650,45 L810,45 A180,180 0 0,1 810,405 L650,405 A180,180 0 0,1 650,45 Z"
        fill="none" stroke="rgba(200,200,220,0.55)" stroke-width="1.5"/>

  <!-- Square trails: dense diagonal star-pattern lines -->
  <g opacity="0.7">
    <!-- hsl(0,80%,55%) = #e03333 -->
    <line x1="210" y1="225" x2="390" y2="45"  stroke="hsl(0,80%,55%)"   stroke-width="0.8" opacity="0.6"/>
    <line x1="390" y1="45"  x2="390" y2="405" stroke="hsl(0,80%,55%)"   stroke-width="0.8" opacity="0.6"/>
    <line x1="390" y1="405" x2="30"  y2="405" stroke="hsl(0,80%,55%)"   stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="405" x2="30"  y2="45"  stroke="hsl(0,80%,55%)"   stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="45"  x2="390" y2="405" stroke="hsl(0,80%,55%)"   stroke-width="0.8" opacity="0.4"/>
    <line x1="390" y1="45"  x2="30"  y2="405" stroke="hsl(0,80%,55%)"   stroke-width="0.8" opacity="0.4"/>
    <!-- hsl(30,80%,55%) = #e07833 -->
    <line x1="210" y1="225" x2="30"  y2="45"  stroke="hsl(30,80%,55%)"  stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="45"  x2="390" y2="45"  stroke="hsl(30,80%,55%)"  stroke-width="0.8" opacity="0.6"/>
    <line x1="390" y1="45"  x2="390" y2="405" stroke="hsl(30,80%,55%)"  stroke-width="0.8" opacity="0.4"/>
    <line x1="30"  y1="405" x2="390" y2="45"  stroke="hsl(30,80%,55%)"  stroke-width="0.8" opacity="0.4"/>
    <!-- hsl(60,80%,55%) -->
    <line x1="210" y1="225" x2="390" y2="225" stroke="hsl(60,80%,55%)"  stroke-width="0.8" opacity="0.6"/>
    <line x1="390" y1="225" x2="30"  y2="225" stroke="hsl(60,80%,55%)"  stroke-width="0.8" opacity="0.6"/>
    <line x1="210" y1="45"  x2="210" y2="405" stroke="hsl(60,80%,55%)"  stroke-width="0.8" opacity="0.4"/>
    <!-- hsl(90,80%,55%) -->
    <line x1="210" y1="225" x2="30"  y2="225" stroke="hsl(90,80%,55%)"  stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="225" x2="30"  y2="45"  stroke="hsl(90,80%,55%)"  stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="45"  x2="390" y2="225" stroke="hsl(90,80%,55%)"  stroke-width="0.8" opacity="0.4"/>
    <!-- hsl(120,80%,55%) -->
    <line x1="210" y1="225" x2="30"  y2="405" stroke="hsl(120,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="405" x2="210" y2="45"  stroke="hsl(120,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <line x1="210" y1="45"  x2="390" y2="405" stroke="hsl(120,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- hsl(150,80%,55%) -->
    <line x1="210" y1="225" x2="210" y2="45"  stroke="hsl(150,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="210" y1="45"  x2="30"  y2="225" stroke="hsl(150,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <line x1="30"  y1="225" x2="210" y2="405" stroke="hsl(150,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <line x1="210" y1="405" x2="390" y2="225" stroke="hsl(150,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- hsl(180,80%,55%) -->
    <line x1="210" y1="225" x2="390" y2="405" stroke="hsl(180,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="390" y1="405" x2="30"  y2="405" stroke="hsl(180,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- hsl(210,80%,55%) -->
    <line x1="210" y1="225" x2="210" y2="405" stroke="hsl(210,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="210" y1="405" x2="390" y2="225" stroke="hsl(210,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <line x1="390" y1="225" x2="210" y2="45"  stroke="hsl(210,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- hsl(240,80%,55%) -->
    <line x1="210" y1="225" x2="30"  y2="45"  stroke="hsl(240,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="45"  x2="390" y2="225" stroke="hsl(240,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- hsl(270,80%,55%) -->
    <line x1="210" y1="225" x2="390" y2="45"  stroke="hsl(270,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="390" y1="45"  x2="30"  y2="225" stroke="hsl(270,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <line x1="30"  y1="225" x2="390" y2="405" stroke="hsl(270,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- hsl(300,80%,55%) -->
    <line x1="210" y1="225" x2="30"  y2="225" stroke="hsl(300,80%,55%)" stroke-width="0.8" opacity="0.6"/>
    <line x1="30"  y1="225" x2="210" y2="45"  stroke="hsl(300,80%,55%)" stroke-width="0.8" opacity="0.5"/>
    <!-- Additional dense layers for square -->
    <line x1="120" y1="45"  x2="390" y2="315" stroke="hsl(0,80%,55%)"   stroke-width="0.6" opacity="0.35"/>
    <line x1="300" y1="45"  x2="30"  y2="315" stroke="hsl(60,80%,55%)"  stroke-width="0.6" opacity="0.35"/>
    <line x1="30"  y1="135" x2="390" y2="135" stroke="hsl(120,80%,55%)" stroke-width="0.6" opacity="0.3"/>
    <line x1="30"  y1="315" x2="390" y2="315" stroke="hsl(180,80%,55%)" stroke-width="0.6" opacity="0.3"/>
    <line x1="120" y1="45"  x2="120" y2="405" stroke="hsl(240,80%,55%)" stroke-width="0.6" opacity="0.3"/>
    <line x1="300" y1="45"  x2="300" y2="405" stroke="hsl(300,80%,55%)" stroke-width="0.6" opacity="0.3"/>
    <line x1="30"  y1="135" x2="300" y2="405" stroke="hsl(30,80%,55%)"  stroke-width="0.6" opacity="0.3"/>
    <line x1="120" y1="45"  x2="390" y2="315" stroke="hsl(150,80%,55%)" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Stadium trails: space-filling chaotic paths -->
  <g opacity="0.75">
    <!-- hsl(0,80%,55%) red -->
    <polyline points="730,225 550,80 660,405 810,200 645,45 810,300 660,405 650,180 810,100 790,405 650,320 690,45 730,225 600,340 810,400 780,80 650,250 810,180 700,45 810,320 660,380 630,100 810,260 730,45 650,200 750,405 810,140 670,405 810,250 700,80 810,360 650,290 810,50 760,405 670,200 810,120"
          fill="none" stroke="hsl(0,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(30,80%,55%) orange -->
    <polyline points="730,225 810,150 680,405 640,60 810,280 700,405 810,80 660,300 810,380 650,140 810,230 710,45 790,380 650,260 810,160 740,405 660,90 810,320 640,200 810,60 700,360 650,100 810,200 720,405 660,50 810,340 680,270 810,120 640,380 810,240 660,130 800,405 650,310 810,70"
          fill="none" stroke="hsl(30,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(60,80%,55%) yellow -->
    <polyline points="730,225 650,300 780,45 810,260 660,405 810,110 700,405 650,170 810,340 740,45 810,210 660,380 810,70 720,405 650,230 810,290 680,45 810,150 700,320 650,80 810,400 760,120 810,350 640,260 810,50 690,405 650,140 810,230 710,360 660,60 800,310 650,390 810,180 730,45"
          fill="none" stroke="hsl(60,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(90,80%,55%) yellow-green -->
    <polyline points="730,225 810,340 680,80 650,360 790,130 810,390 700,45 810,220 660,405 630,150 810,280 750,45 660,280 810,50 740,380 650,200 810,160 700,390 660,100 810,300 720,45 790,360 650,120 810,240 680,405 810,80 650,280 810,400 760,200 670,45 810,340 640,320 810,110 700,360"
          fill="none" stroke="hsl(90,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(120,80%,55%) green -->
    <polyline points="730,225 660,45 810,220 700,405 810,110 650,260 780,400 810,160 640,320 810,50 700,380 650,100 810,360 730,45 810,240 680,390 660,150 800,300 650,360 810,190 720,45 810,310 660,405 630,200 810,270 750,80 650,340 810,130 700,45 810,370 680,260 810,90 650,180 740,405"
          fill="none" stroke="hsl(120,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(150,80%,55%) teal-green -->
    <polyline points="730,225 810,50 700,320 650,80 810,280 660,405 810,130 740,370 650,210 810,400 710,60 790,370 640,260 810,190 680,45 810,310 660,380 810,240 700,405 650,160 810,340 720,100 810,210 660,45 770,405 650,300 810,70 700,250 810,420 660,200 810,150 640,350 810,260 700,80"
          fill="none" stroke="hsl(150,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(180,80%,55%) cyan -->
    <polyline points="730,225 650,400 790,170 810,380 700,45 810,250 660,400 810,80 750,360 650,140 810,320 680,45 810,160 720,405 660,260 810,50 700,380 650,220 810,290 740,80 810,420 660,300 790,45 650,180 810,240 710,400 800,130 650,340 810,190 680,405 810,350 640,280 810,100 700,45"
          fill="none" stroke="hsl(180,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(210,80%,55%) blue -->
    <polyline points="730,225 810,320 660,60 650,340 800,180 810,420 700,80 810,200 650,390 780,45 810,290 660,405 640,230 810,110 720,360 650,160 810,350 700,405 810,140 680,310 650,50 810,260 750,400 660,170 810,380 710,45 790,300 640,400 810,220 670,100 810,360 650,270 800,45 720,405"
          fill="none" stroke="hsl(210,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(240,80%,55%) indigo -->
    <polyline points="730,225 650,110 810,300 700,405 810,70 660,350 780,60 810,250 640,380 810,150 700,45 810,390 660,200 650,390 800,120 810,330 720,420 650,240 810,90 740,380 660,60 810,360 700,280 650,45 810,210 680,405 800,250 660,130 810,380 710,330 780,50 650,310 810,160 720,420"
          fill="none" stroke="hsl(240,80%,55%)" stroke-width="0.7" opacity="0.55"/>
    <!-- hsl(270,80%,55%) violet -->
    <polyline points="730,225 810,420 660,140 790,400 650,200 810,280 700,45 800,390 650,120 810,200 740,420 660,300 810,60 700,380 650,260 810,340 680,80 810,170 720,405 650,350 810,110 760,290 660,420 810,240 700,160 650,420 800,200 660,50 810,310 730,405 790,130 650,300 810,370 680,240"
          fill="none" stroke="hsl(270,80%,55%)" stroke-width="0.7" opacity="0.55"/>
  </g>

  <!-- Labels -->
  <text x="210" y="32" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(180,180,200,0.5)">Square (integrable)</text>
  <text x="730" y="32" text-anchor="middle" font-family="monospace" font-size="13" fill="rgba(180,180,200,0.5)">Bunimovich Stadium (ergodic)</text>
</svg>
