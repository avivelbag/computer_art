<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background: charcoal -->
  <rect width="400" height="400" fill="#1c2126"/>

  <!-- Deep teal halos (intermediate V concentration) -->
  <ellipse cx="200" cy="200" rx="68" ry="48" fill="#0d4f6e" transform="rotate(18 200 200)"/>
  <ellipse cx="95"  cy="110" rx="42" ry="28" fill="#0d4f6e" transform="rotate(-25 95 110)"/>
  <ellipse cx="310" cy="130" rx="36" ry="24" fill="#0d4f6e" transform="rotate(40 310 130)"/>
  <ellipse cx="340" cy="280" rx="44" ry="30" fill="#0d4f6e" transform="rotate(-15 340 280)"/>
  <ellipse cx="70"  cy="300" rx="38" ry="22" fill="#0d4f6e" transform="rotate(30 70 300)"/>
  <ellipse cx="170" cy="340" rx="30" ry="20" fill="#0d4f6e" transform="rotate(-10 170 340)"/>
  <ellipse cx="280" cy="60"  rx="32" ry="18" fill="#0d4f6e" transform="rotate(50 280 60)"/>
  <ellipse cx="130" cy="250" rx="26" ry="18" fill="#0d4f6e" transform="rotate(20 130 250)"/>
  <ellipse cx="360" cy="180" rx="22" ry="16" fill="#0d4f6e" transform="rotate(-35 360 180)"/>
  <ellipse cx="50"  cy="190" rx="20" ry="14" fill="#0d4f6e" transform="rotate(10 50 190)"/>

  <!-- Warm cream peaks (high V concentration) -->
  <ellipse cx="200" cy="200" rx="48" ry="32" fill="#e8d5a0" transform="rotate(18 200 200)"/>
  <ellipse cx="95"  cy="110" rx="26" ry="16" fill="#e8d5a0" transform="rotate(-25 95 110)"/>
  <ellipse cx="310" cy="130" rx="22" ry="13" fill="#e8d5a0" transform="rotate(40 310 130)"/>
  <ellipse cx="340" cy="280" rx="28" ry="18" fill="#e8d5a0" transform="rotate(-15 340 280)"/>
  <ellipse cx="70"  cy="300" rx="24" ry="13" fill="#e8d5a0" transform="rotate(30 70 300)"/>
  <ellipse cx="170" cy="340" rx="18" ry="12" fill="#e8d5a0" transform="rotate(-10 170 340)"/>
  <ellipse cx="280" cy="60"  rx="20" ry="10" fill="#e8d5a0" transform="rotate(50 280 60)"/>
  <ellipse cx="130" cy="250" rx="15" ry="10" fill="#e8d5a0" transform="rotate(20 130 250)"/>
  <ellipse cx="360" cy="180" rx="12" ry="8"  fill="#e8d5a0" transform="rotate(-35 360 180)"/>
  <ellipse cx="50"  cy="190" rx="11" ry="7"  fill="#e8d5a0" transform="rotate(10 50 190)"/>

  <!-- Scattered small spots to suggest spot-like sub-patterns -->
  <circle cx="245" cy="155" r="8"  fill="#e8d5a0"/>
  <circle cx="160" cy="270" r="7"  fill="#e8d5a0"/>
  <circle cx="310" cy="220" r="6"  fill="#e8d5a0"/>
  <circle cx="80"  cy="55"  r="5"  fill="#e8d5a0"/>
  <circle cx="350" cy="350" r="6"  fill="#e8d5a0"/>
  <circle cx="40"  cy="380" r="5"  fill="#e8d5a0"/>
  <circle cx="390" cy="90"  r="4"  fill="#e8d5a0"/>
  <circle cx="225" cy="380" r="5"  fill="#e8d5a0"/>
  <circle cx="245" cy="155" r="14" fill="none" stroke="#0d4f6e" stroke-width="3"/>
  <circle cx="160" cy="270" r="13" fill="none" stroke="#0d4f6e" stroke-width="3"/>
  <circle cx="310" cy="220" r="12" fill="none" stroke="#0d4f6e" stroke-width="3"/>
</svg>
