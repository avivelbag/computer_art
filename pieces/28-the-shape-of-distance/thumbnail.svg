<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#0d2a3e"/>
      <stop offset="100%" stop-color="#040c14"/>
    </radialGradient>
    <radialGradient id="formGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#f5e090"/>
      <stop offset="45%" stop-color="#e88030"/>
      <stop offset="100%" stop-color="#b03018"/>
    </radialGradient>
    <radialGradient id="torusGrad" cx="38%" cy="32%" r="65%">
      <stop offset="0%" stop-color="#f0d468"/>
      <stop offset="55%" stop-color="#e07030"/>
      <stop offset="100%" stop-color="#983018"/>
    </radialGradient>
    <radialGradient id="chromGrad" cx="35%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#d8e8f0"/>
      <stop offset="50%" stop-color="#5888a8"/>
      <stop offset="100%" stop-color="#102038"/>
    </radialGradient>
    <filter id="shadowBlur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Ground plane -->
  <rect x="0" y="295" width="400" height="105" fill="#070f18" opacity="0.8"/>
  <line x1="0" y1="295" x2="400" y2="295" stroke="#1a3040" stroke-width="1"/>

  <!-- Checker ground (subtle) -->
  <g opacity="0.06">
    <rect x="0"   y="295" width="40" height="40" fill="#fff"/>
    <rect x="80"  y="295" width="40" height="40" fill="#fff"/>
    <rect x="160" y="295" width="40" height="40" fill="#fff"/>
    <rect x="240" y="295" width="40" height="40" fill="#fff"/>
    <rect x="320" y="295" width="40" height="40" fill="#fff"/>
    <rect x="40"  y="335" width="40" height="40" fill="#fff"/>
    <rect x="120" y="335" width="40" height="40" fill="#fff"/>
    <rect x="200" y="335" width="40" height="40" fill="#fff"/>
    <rect x="280" y="335" width="40" height="40" fill="#fff"/>
    <rect x="360" y="335" width="40" height="40" fill="#fff"/>
  </g>

  <!-- Main shadow on ground -->
  <ellipse cx="195" cy="300" rx="120" ry="18" fill="#000" opacity="0.50" filter="url(#shadowBlur)"/>

  <!-- Torus outer glow -->
  <ellipse cx="200" cy="200" rx="130" ry="72" fill="none" stroke="#e87030" stroke-width="60" opacity="0.10" filter="url(#shadowBlur)"/>

  <!-- Torus body -->
  <ellipse cx="200" cy="200" rx="122" ry="65" fill="none" stroke="url(#torusGrad)" stroke-width="40"/>

  <!-- Torus inner shadow edge -->
  <ellipse cx="200" cy="204" rx="116" ry="58" fill="none" stroke="#200802" stroke-width="8" opacity="0.35"/>

  <!-- Central sphere (blends with torus via smooth-min in shader) -->
  <circle cx="197" cy="196" r="56" fill="url(#formGrad)"/>

  <!-- Sphere highlight -->
  <ellipse cx="180" cy="178" rx="18" ry="11" fill="#fff" opacity="0.28" transform="rotate(-25,180,178)"/>

  <!-- Ambient bounce light below form -->
  <ellipse cx="200" cy="222" rx="52" ry="20" fill="#e07030" opacity="0.06" filter="url(#shadowBlur)"/>

  <!-- Small box (left foreground) -->
  <rect x="52" y="248" width="44" height="47" rx="2" fill="#132030" stroke="#1e3040" stroke-width="1"/>
  <polygon points="52,248 72,236 116,236 96,248" fill="#192836" stroke="#1e3040" stroke-width="1"/>
  <polygon points="96,248 116,236 116,260 96,272" fill="#0e1c28" stroke="#1e3040" stroke-width="1"/>

  <!-- Reflective sphere (right foreground) -->
  <circle cx="315" cy="268" r="34" fill="url(#chromGrad)"/>
  <ellipse cx="304" cy="258" rx="10" ry="6" fill="#fff" opacity="0.40" transform="rotate(-15,304,258)"/>
  <ellipse cx="318" cy="275" rx="16" ry="10" fill="#e07030" opacity="0.18" transform="rotate(10,318,275)"/>
  <ellipse cx="315" cy="298" rx="28" ry="6" fill="#000" opacity="0.30" filter="url(#shadowBlur)"/>

  <!-- Skylight ambient at top -->
  <ellipse cx="200" cy="20" rx="180" ry="60" fill="#1a4060" opacity="0.12" filter="url(#shadowBlur)"/>
</svg>
