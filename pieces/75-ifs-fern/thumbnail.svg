<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <rect width="400" height="400" fill="#050a05"/>
  <defs>
    <radialGradient id="stemGrad" cx="50%" cy="90%" r="60%">
      <stop offset="0%" stop-color="#10b950" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#10b950" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050a05" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="leafGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#84e65a" stop-opacity="0.85"/>
      <stop offset="70%" stop-color="#10b950" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#050a05" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tipGrad" cx="50%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#84e65a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fern stem: thick bottom, thin top -->
  <line x1="200" y1="390" x2="200" y2="60" stroke="#10b950" stroke-width="2.5" stroke-opacity="0.7" filter="url(#glow)"/>
  <line x1="200" y1="390" x2="200" y2="200" stroke="#10b950" stroke-width="4" stroke-opacity="0.4"/>

  <!-- Left fronds at varying heights -->
  <!-- Bottom fronds - large -->
  <path d="M200,360 Q165,340 140,310" stroke="#10b950" stroke-width="2" fill="none" stroke-opacity="0.8" filter="url(#glow)"/>
  <path d="M140,310 Q120,295 108,280" stroke="#10b950" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <path d="M140,310 Q125,300 118,288" stroke="#84e65a" stroke-width="1" fill="none" stroke-opacity="0.5"/>

  <path d="M200,330 Q172,308 152,282" stroke="#10b950" stroke-width="1.8" fill="none" stroke-opacity="0.75" filter="url(#glow)"/>
  <path d="M152,282 Q135,268 124,252" stroke="#10b950" stroke-width="1.3" fill="none" stroke-opacity="0.55"/>

  <!-- Right fronds at matching heights -->
  <path d="M200,360 Q235,340 260,310" stroke="#10b950" stroke-width="2" fill="none" stroke-opacity="0.8" filter="url(#glow)"/>
  <path d="M260,310 Q280,295 292,280" stroke="#10b950" stroke-width="1.5" fill="none" stroke-opacity="0.6"/>
  <path d="M260,310 Q275,300 282,288" stroke="#84e65a" stroke-width="1" fill="none" stroke-opacity="0.5"/>

  <path d="M200,330 Q228,308 248,282" stroke="#10b950" stroke-width="1.8" fill="none" stroke-opacity="0.75" filter="url(#glow)"/>
  <path d="M248,282 Q265,268 276,252" stroke="#10b950" stroke-width="1.3" fill="none" stroke-opacity="0.55"/>

  <!-- Mid fronds -->
  <path d="M200,295 Q175,275 158,252" stroke="#84e65a" stroke-width="1.6" fill="none" stroke-opacity="0.7" filter="url(#glow)"/>
  <path d="M158,252 Q144,238 136,222" stroke="#84e65a" stroke-width="1.1" fill="none" stroke-opacity="0.5"/>

  <path d="M200,295 Q225,275 242,252" stroke="#84e65a" stroke-width="1.6" fill="none" stroke-opacity="0.7" filter="url(#glow)"/>
  <path d="M242,252 Q256,238 264,222" stroke="#84e65a" stroke-width="1.1" fill="none" stroke-opacity="0.5"/>

  <path d="M200,260 Q180,240 166,218" stroke="#84e65a" stroke-width="1.4" fill="none" stroke-opacity="0.65" filter="url(#glow)"/>
  <path d="M200,260 Q220,240 234,218" stroke="#84e65a" stroke-width="1.4" fill="none" stroke-opacity="0.65" filter="url(#glow)"/>

  <!-- Upper fronds getting smaller -->
  <path d="M200,225 Q184,208 174,190" stroke="#84e65a" stroke-width="1.2" fill="none" stroke-opacity="0.6" filter="url(#glow)"/>
  <path d="M200,225 Q216,208 226,190" stroke="#84e65a" stroke-width="1.2" fill="none" stroke-opacity="0.6" filter="url(#glow)"/>
  <path d="M174,190 Q164,178 158,166" stroke="#10b950" stroke-width="0.9" fill="none" stroke-opacity="0.4"/>
  <path d="M226,190 Q236,178 242,166" stroke="#10b950" stroke-width="0.9" fill="none" stroke-opacity="0.4"/>

  <path d="M200,190 Q188,174 180,158" stroke="#84e65a" stroke-width="1.0" fill="none" stroke-opacity="0.55" filter="url(#glow)"/>
  <path d="M200,190 Q212,174 220,158" stroke="#84e65a" stroke-width="1.0" fill="none" stroke-opacity="0.55" filter="url(#glow)"/>

  <path d="M200,158 Q192,144 187,130" stroke="#fbbf24" stroke-width="0.8" fill="none" stroke-opacity="0.5" filter="url(#glow)"/>
  <path d="M200,158 Q208,144 213,130" stroke="#fbbf24" stroke-width="0.8" fill="none" stroke-opacity="0.5" filter="url(#glow)"/>

  <!-- Tip -->
  <path d="M200,130 Q198,110 200,90" stroke="#fbbf24" stroke-width="0.9" fill="none" stroke-opacity="0.7" filter="url(#glow)"/>
  <path d="M200,100 Q196,88 194,76" stroke="#dce8dc" stroke-width="0.7" fill="none" stroke-opacity="0.5" filter="url(#glow)"/>
  <path d="M200,100 Q204,88 206,76" stroke="#dce8dc" stroke-width="0.7" fill="none" stroke-opacity="0.5" filter="url(#glow)"/>

  <!-- Dot clusters to suggest density / chaos-game points -->
  <!-- Bottom cluster -->
  <g fill="#10b950" opacity="0.6">
    <circle cx="200" cy="375" r="1.5"/>
    <circle cx="196" cy="370" r="1.2"/>
    <circle cx="204" cy="368" r="1.2"/>
    <circle cx="199" cy="362" r="1.0"/>
  </g>
  <!-- Left frond dots -->
  <g fill="#84e65a" opacity="0.55">
    <circle cx="148" cy="315" r="1.2"/>
    <circle cx="144" cy="308" r="1.0"/>
    <circle cx="152" cy="306" r="0.9"/>
    <circle cx="115" cy="276" r="0.9"/>
    <circle cx="120" cy="271" r="0.8"/>
  </g>
  <!-- Right frond dots -->
  <g fill="#84e65a" opacity="0.55">
    <circle cx="252" cy="315" r="1.2"/>
    <circle cx="256" cy="308" r="1.0"/>
    <circle cx="248" cy="306" r="0.9"/>
    <circle cx="285" cy="276" r="0.9"/>
    <circle cx="280" cy="271" r="0.8"/>
  </g>
  <!-- Tip dots -->
  <g fill="#fbbf24" opacity="0.6">
    <circle cx="200" cy="75" r="1.2"/>
    <circle cx="197" cy="69" r="0.9"/>
    <circle cx="203" cy="67" r="0.9"/>
    <circle cx="200" cy="62" r="0.8"/>
  </g>

  <!-- Ambient glow overlays -->
  <ellipse cx="200" cy="250" rx="80" ry="130" fill="url(#leafGrad)" opacity="0.18"/>
  <ellipse cx="200" cy="380" rx="30" ry="30" fill="url(#stemGrad)" opacity="0.25"/>
  <ellipse cx="200" cy="80" rx="25" ry="35" fill="url(#tipGrad)" opacity="0.3"/>
</svg>
