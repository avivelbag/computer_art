<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hyperbolic Tiling — Poincaré Disk</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0818;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: 100vmin;
      height: 100vmin;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <script>
    // {5,4} tiling: pentagons, 4 meeting at each vertex.
    // Generated by reflecting a fundamental domain (hyperbolic triangle) via
    // Möbius transforms (hyperbolic isometries) until tiles become sub-pixel.
    const P = 5, Q = 4;
    const CULL_R = 0.5;  // cull tiles with Euclidean circumradius < CULL_R px
    const MAX_DEPTH = 12;
    const ROT_SPEED = 0.018; // radians per second for Möbius autorotation

    // Palette: deep indigo bg, amber fill, rose accent, pale gold stroke
    const BG      = "#0a0818";
    const COLORS  = ["#c8790a", "#e8a020", "#b05a14"];  // amber tones
    const STROKE  = "#f5d070";
    const DISK_STROKE = "#4433aa";

    const canvas = document.getElementById("c");
    const ctx = canvas.getContext("2d");

    function resize() {
      const s = Math.min(window.innerWidth, window.innerHeight);
      canvas.width  = s;
      canvas.height = s;
    }
    window.addEventListener("resize", resize);
    resize();

    // ---- Complex arithmetic (represented as [re, im]) ----
    function cadd(a, b) { return [a[0]+b[0], a[1]+b[1]]; }
    function csub(a, b) { return [a[0]-b[0], a[1]-b[1]]; }
    function cmul(a, b) { return [a[0]*b[0]-a[1]*b[1], a[0]*b[1]+a[1]*b[0]]; }
    function cabs2(a)   { return a[0]*a[0]+a[1]*a[1]; }
    function cabs(a)    { return Math.sqrt(cabs2(a)); }
    function cconj(a)   { return [a[0], -a[1]]; }

    /**
     * Möbius transform T_p(z) = (z - p) / (1 - conj(p)*z).
     * Maps the Poincaré disk to itself, sending point p to origin.
     */
    function mobius(z, p) {
      const num = csub(z, p);
      const den = csub([1,0], cmul(cconj(p), z));
      const d2  = cabs2(den);
      return [(num[0]*den[0]+num[1]*den[1])/d2,
              (num[1]*den[0]-num[0]*den[1])/d2];
    }

    /**
     * Inverse Möbius: T_p^{-1}(z) = (z + p) / (1 + conj(p)*z).
     */
    function mobiusInv(z, p) {
      const num = cadd(z, p);
      const den = cadd([1,0], cmul(cconj(p), z));
      const d2  = cabs2(den);
      return [(num[0]*den[0]+num[1]*den[1])/d2,
              (num[1]*den[0]-num[0]*den[1])/d2];
    }

    /**
     * Rotation Möbius: multiply z by e^{i*theta}.
     */
    function rot(z, theta) {
      const c = Math.cos(theta), s = Math.sin(theta);
      return [z[0]*c - z[1]*s, z[0]*s + z[1]*c];
    }

    // ---- Compute the fundamental {P,Q} polygon ----
    // The circumradius r of a regular hyperbolic P-gon with Q per vertex:
    //   cosh(r) = cos(π/Q) / sin(π/P)
    const coshr = Math.cos(Math.PI/Q) / Math.sin(Math.PI/P);
    const r0 = Math.acosh(coshr);
    // Euclidean radius in the Poincaré disk: tanh(r0/2)
    const R0 = Math.tanh(r0/2);

    /**
     * Build the P vertices of the fundamental polygon, centered at origin,
     * vertex 0 on the positive real axis.
     */
    function fundamentalPolygon(center, angleOffset) {
      const verts = [];
      for (let k = 0; k < P; k++) {
        const theta = angleOffset + (2*Math.PI*k)/P;
        const v = [R0*Math.cos(theta), R0*Math.sin(theta)];
        // translate center from origin to 'center' via inverse Möbius
        verts.push(mobiusInv(v, center));
      }
      return verts;
    }

    // ---- Geodesic arc drawing in the Poincaré disk ----
    /**
     * Draw a hyperbolic geodesic from disk-point a to disk-point b
     * as a Euclidean circle arc orthogonal to the unit circle.
     * If both points lie on a diameter, draw a straight line instead.
     */
    function geodesicArc(ctx, a, b, R) {
      const ax = a[0]*R, ay = a[1]*R;
      const bx = b[0]*R, by = b[1]*R;

      // Check collinearity through origin (cross product ~ 0)
      if (Math.abs(ax*by - ay*bx) < 1e-6) {
        ctx.lineTo(bx, by);
        return;
      }

      // Find the inversion circle: the unique Euclidean circle through a, b
      // that is orthogonal to the unit circle.
      // Center of that circle lies on the perpendicular bisectors of (a,b)
      // and satisfies |c|^2 - r^2 = R^2.
      const mx = (ax+bx)/2, my = (ay+by)/2;
      const dx = bx-ax, dy = by-ay;
      // Perpendicular bisector direction: (-dy, dx)
      // Center: (mx - t*dy, my + t*dx) for some t.
      // Orthogonality to disk of radius R: |c|^2 = r^2 + R^2
      // and r^2 = |c - a|^2, so |c|^2 = |c-a|^2 + R^2
      // => 2*c.a = R^2 + |a|^2... deriving directly:
      // cx*(ax+bx) + cy*(ay+by) = R^2 + ax*bx + ay*by  [chord-power relation]
      const rhs = R*R + ax*bx + ay*by;
      // cx = mx - t*dy, cy = my + t*dx
      // (mx - t*dy)*(ax+bx) + (my + t*dx)*(ay+by) = rhs
      const denom = -dy*(ax+bx) + dx*(ay+by);
      if (Math.abs(denom) < 1e-8) {
        ctx.lineTo(bx, by);
        return;
      }
      const t = (rhs - mx*(ax+bx) - my*(ay+by)) / denom;
      const cx = mx - t*dy;
      const cy = my + t*dx;
      const arcR = Math.sqrt((cx-ax)*(cx-ax)+(cy-ay)*(cy-ay));

      const startAngle = Math.atan2(ay-cy, ax-cx);
      const endAngle   = Math.atan2(by-cy, bx-cx);

      // Choose the short arc (the one that stays inside the disk)
      let diff = endAngle - startAngle;
      while (diff >  Math.PI) diff -= 2*Math.PI;
      while (diff < -Math.PI) diff += 2*Math.PI;
      const ccw = diff > 0;
      ctx.arc(cx, cy, arcR, startAngle, endAngle, !ccw);
    }

    /**
     * Draw a filled hyperbolic polygon given its vertices in disk coordinates.
     * Edges are geodesic arcs.
     */
    function drawPolygon(ctx, verts, R) {
      ctx.beginPath();
      const x0 = verts[0][0]*R, y0 = verts[0][1]*R;
      ctx.moveTo(x0, y0);
      for (let i = 1; i < verts.length; i++) {
        geodesicArc(ctx, verts[i-1], verts[i], R);
      }
      geodesicArc(ctx, verts[verts.length-1], verts[0], R);
      ctx.closePath();
    }

    // ---- Tile BFS ----
    /**
     * Compute the center of the adjacent tile across edge (v[k], v[(k+1)%P]).
     * The reflection of the origin across the hyperbolic midpoint of that edge
     * gives the new tile center.
     * Equivalently: translate so edge midpoint is origin, negate, translate back.
     */
    function adjacentCenter(center, verts, k) {
      const a = verts[k];
      const b = verts[(k+1) % P];
      // Midpoint in the disk via Möbius: translate a to origin, find midpoint of
      // (0, mobius(b, a)), then translate back.
      const bRel = mobius(b, a);
      // Midpoint in hyperbolic sense: scale bRel by tanh(d/2) where d = artanh(|bRel|)
      // i.e. midpoint = bRel / (1 + sqrt(1 - |bRel|^2))  ... simplified:
      const lenB = cabs(bRel);
      const midScale = lenB < 1e-10 ? 0 : Math.tanh(Math.atanh(lenB)/2) / lenB;
      const midRel = [bRel[0]*midScale, bRel[1]*midScale];
      const mid = mobiusInv(midRel, a);  // edge midpoint in disk

      // Reflect center through edge midpoint: T_mid(−T_mid(center))
      const cRel = mobius(center, mid);
      const reflected = mobiusInv([-cRel[0], -cRel[1]], mid);
      return reflected;
    }

    /**
     * Approximate the Euclidean circumradius of a polygon's image in screen space.
     * Used for culling sub-pixel tiles.
     */
    function euclideanCircumradius(verts, R) {
      let cx = 0, cy = 0;
      for (const v of verts) { cx += v[0]; cy += v[1]; }
      cx /= verts.length; cy /= verts.length;
      let maxD = 0;
      for (const v of verts) {
        const dx = v[0]*R - cx*R, dy = v[1]*R - cy*R;
        maxD = Math.max(maxD, Math.sqrt(dx*dx+dy*dy));
      }
      return maxD;
    }

    /**
     * BFS tile generation.  Returns array of {verts, depth, colorIdx}.
     * Stops when a tile's Euclidean screen circumradius < CULL_R pixels.
     */
    function buildTiles(globalRot, screenR) {
      const tiles = [];
      // Key: stringify center to avoid revisiting
      const visited = new Set();

      function centerKey(c) {
        return (Math.round(c[0]*1e5)/1e5) + "," + (Math.round(c[1]*1e5)/1e5);
      }

      // Apply global rotation
      const origin = rot([0,0], globalRot);  // origin rotated is still [0,0]
      const initCenter = [0, 0];
      const queue = [{ center: initCenter, depth: 0, colorIdx: 0 }];
      visited.add(centerKey(initCenter));

      while (queue.length > 0) {
        const { center, depth, colorIdx } = queue.shift();

        const angle = globalRot + (2*Math.PI / P) * 0; // base orientation
        const verts = fundamentalPolygon(center, globalRot);

        const er = euclideanCircumradius(verts, screenR);
        if (er < CULL_R) continue;

        tiles.push({ verts, depth, colorIdx });

        if (depth < MAX_DEPTH) {
          for (let k = 0; k < P; k++) {
            const nc = adjacentCenter(center, verts, k);
            if (cabs(nc) >= 0.999) continue;
            const key = centerKey(nc);
            if (!visited.has(key)) {
              visited.add(key);
              queue.push({ center: nc, depth: depth+1, colorIdx: (colorIdx+k+1) % COLORS.length });
            }
          }
        }
      }
      return tiles;
    }

    let t0 = null;

    function draw(ts) {
      if (!t0) t0 = ts;
      const elapsed = (ts - t0) * 0.001;
      const globalRot = elapsed * ROT_SPEED;

      const W = canvas.width, H = canvas.height;
      const cx = W/2, cy = H/2;
      const screenR = Math.min(W, H) * 0.48;

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);

      // Clip everything to the disk
      ctx.save();
      ctx.translate(cx, cy);
      ctx.beginPath();
      ctx.arc(0, 0, screenR, 0, 2*Math.PI);
      ctx.clip();

      const tiles = buildTiles(globalRot, screenR);

      for (const { verts, depth, colorIdx } of tiles) {
        drawPolygon(ctx, verts, screenR);
        ctx.fillStyle = COLORS[colorIdx];
        ctx.fill();
        ctx.strokeStyle = STROKE;
        ctx.lineWidth = Math.max(0.4, 1.2 - depth * 0.08);
        ctx.stroke();
      }

      ctx.restore();

      // Disk boundary ring
      ctx.beginPath();
      ctx.arc(cx, cy, screenR, 0, 2*Math.PI);
      ctx.strokeStyle = DISK_STROKE;
      ctx.lineWidth = 1.5;
      ctx.stroke();

      requestAnimationFrame(draw);
    }

    requestAnimationFrame(draw);
  </script>
</body>
</html>
