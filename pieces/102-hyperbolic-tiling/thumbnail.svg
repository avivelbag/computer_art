    <polygon points="38,213  30,220  19,217  15,206  22,196"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="32,170  23,175  13,170  12,159  21,153"
             fill="url(#amber2)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="40,128  31,131  23,124  25,113  34,109"
             fill="url(#amber1)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="60,90   52,91   46,82   50,72   59,70"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="88,61   82,60   78,50   84,42   93,43"
             fill="url(#amber2)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="124,45  119,42  117,32  124,26  133,29"
