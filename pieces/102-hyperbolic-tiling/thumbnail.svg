             fill="url(#amber2)" stroke="#f5d070" stroke-width="1.0"/>
    <polygon points="254,108 287,97  296,136 268,155 239,133"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="1.0"/>
    <polygon points="274,178 303,169 318,206 298,236 265,227"
             fill="url(#amber2)" stroke="#f5d070" stroke-width="1.0"/>
    <polygon points="230,255 255,243 272,271 255,300 218,302"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="1.0"/>
    <polygon points="162,255 183,267 174,300 137,302 118,272"
             fill="url(#amber2)" stroke="#f5d070" stroke-width="1.0"/>
    <polygon points="113,190 102,163 131,145 160,162 155,194"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="1.0"/>
    <polygon points="120,108 148,97  162,133 139,156 107,141"
             fill="url(#amber2)" stroke="#f5d070" stroke-width="1.0"/>

