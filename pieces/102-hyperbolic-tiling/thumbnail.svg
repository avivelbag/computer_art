    <polygon points="340,137 354,132 360,150 349,162 334,157"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="354,176 368,175 371,193 360,203 346,198"
             fill="url(#amber2)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="356,216 369,218 368,236 356,243 344,237"
             fill="url(#amber1)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="340,256 350,262 345,280 332,284 324,273"
             fill="url(#amber3)" stroke="#f5d070" stroke-width="0.7"/>
    <polygon points="314,290 321,298 314,315 300,317 294,305"
