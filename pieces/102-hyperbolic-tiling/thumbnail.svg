<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#16103a"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </radialGradient>
    <radialGradient id="amber1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#e8a020"/>
      <stop offset="100%" stop-color="#7a3d05"/>
    </radialGradient>
    <radialGradient id="amber2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#c8790a"/>
      <stop offset="100%" stop-color="#5a2a02"/>
    </radialGradient>
    <radialGradient id="amber3" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#b05a14"/>
      <stop offset="100%" stop-color="#4a1e00"/>
    </radialGradient>
    <clipPath id="disk">
      <circle cx="200" cy="200" r="192"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Poincaré disk fill -->
  <circle cx="200" cy="200" r="192" fill="#0d0b22"/>

  <g clip-path="url(#disk)">
    <!-- Central pentagon -->
    <polygon points="200,128 262,163 239,232 161,232 138,163"
             fill="url(#amber1)" stroke="#f5d070" stroke-width="1.2"/>

    <!-- Ring 1: 5 pentagons (approximate hyperbolic positions) -->
