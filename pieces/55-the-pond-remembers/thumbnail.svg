<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0520"/>
      <stop offset="100%" stop-color="#020008"/>
    </radialGradient>
    <radialGradient id="gindigo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6625cc" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6625cc" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gamber" cx="55%" cy="60%" r="45%">
      <stop offset="0%" stop-color="#d08010" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#d08010" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="400" height="400"/></clipPath>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Source A — upper left; indigo rings -->
  <g clip-path="url(#clip)" fill="none" stroke="#5520cc" stroke-opacity="0.38" stroke-width="1.1">
    <circle cx="105" cy="95" r="22"/><circle cx="105" cy="95" r="44"/>
    <circle cx="105" cy="95" r="66"/><circle cx="105" cy="95" r="88"/>
    <circle cx="105" cy="95" r="110"/><circle cx="105" cy="95" r="132"/>
    <circle cx="105" cy="95" r="154"/><circle cx="105" cy="95" r="176"/>
    <circle cx="105" cy="95" r="198"/><circle cx="105" cy="95" r="220"/>
  </g>

  <!-- Source B — upper right; indigo rings -->
  <g clip-path="url(#clip)" fill="none" stroke="#5520cc" stroke-opacity="0.38" stroke-width="1.1">
    <circle cx="290" cy="80" r="22"/><circle cx="290" cy="80" r="44"/>
    <circle cx="290" cy="80" r="66"/><circle cx="290" cy="80" r="88"/>
    <circle cx="290" cy="80" r="110"/><circle cx="290" cy="80" r="132"/>
    <circle cx="290" cy="80" r="154"/><circle cx="290" cy="80" r="176"/>
    <circle cx="290" cy="80" r="198"/><circle cx="290" cy="80" r="220"/>
  </g>

  <!-- Source C — centre; amber rings -->
  <g clip-path="url(#clip)" fill="none" stroke="#c07810" stroke-opacity="0.42" stroke-width="1.1">
    <circle cx="200" cy="200" r="22"/><circle cx="200" cy="200" r="44"/>
    <circle cx="200" cy="200" r="66"/><circle cx="200" cy="200" r="88"/>
    <circle cx="200" cy="200" r="110"/><circle cx="200" cy="200" r="132"/>
    <circle cx="200" cy="200" r="154"/><circle cx="200" cy="200" r="176"/>
  </g>

  <!-- Source D — lower left; indigo rings -->
  <g clip-path="url(#clip)" fill="none" stroke="#5520cc" stroke-opacity="0.38" stroke-width="1.1">
    <circle cx="82" cy="305" r="22"/><circle cx="82" cy="305" r="44"/>
    <circle cx="82" cy="305" r="66"/><circle cx="82" cy="305" r="88"/>
    <circle cx="82" cy="305" r="110"/><circle cx="82" cy="305" r="132"/>
    <circle cx="82" cy="305" r="154"/><circle cx="82" cy="305" r="176"/>
  </g>

  <!-- Source E — lower right; amber rings -->
  <g clip-path="url(#clip)" fill="none" stroke="#c07810" stroke-opacity="0.42" stroke-width="1.1">
    <circle cx="318" cy="310" r="22"/><circle cx="318" cy="310" r="44"/>
    <circle cx="318" cy="310" r="66"/><circle cx="318" cy="310" r="88"/>
    <circle cx="318" cy="310" r="110"/><circle cx="318" cy="310" r="132"/>
    <circle cx="318" cy="310" r="154"/><circle cx="318" cy="310" r="176"/>
  </g>

  <!-- colour atmosphere layers -->
  <rect width="400" height="400" fill="url(#gindigo)"/>
  <rect width="400" height="400" fill="url(#gamber)"/>

  <!-- Source glow dots -->
  <circle cx="105" cy="95"  r="5" fill="#8844ff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="290" cy="80"  r="5" fill="#8844ff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="200" cy="200" r="5" fill="#ffaa22" opacity="0.95" filter="url(#glow)"/>
  <circle cx="82"  cy="305" r="5" fill="#8844ff" opacity="0.95" filter="url(#glow)"/>
  <circle cx="318" cy="310" r="5" fill="#ffaa22" opacity="0.95" filter="url(#glow)"/>
</svg>
