<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Harmonograph — Damped-Pendulum Lissajous Line Art</title>
<style>
html,body{margin:0;padding:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;min-height:100vh}
canvas{display:block;max-width:96vmin;max-height:96vmin}
</style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const W = 800, H = 800, CX = 400, CY = 400;

const TOTAL_STEPS = 100_000;
const SEGMENT     = 500;
const DRAW_SECS   = 8;
const HOLD_SECS   = 1.5;
const FADE_SECS   = 1.0;
const T_MAX       = 1000;
const MAX_WIDTH   = 2.5;
const MIN_WIDTH   = 0.15;
const ALPHA       = 0.6;

/*
 * Each preset defines:
 *   x(t) = A1*sin(f1*t + p1)*exp(-d1*t) + A2*sin(f2*t + p2)*exp(-d2*t)
 *   y(t) = B1*sin(g1*t)*exp(-e1*t)
 *
 * Frequency ratios f1:g1 are simple rationals (3:2, 5:4, 5:3, 7:4, 1:1)
 * that produce recognisable Lissajous-family figures.
 * Damping constants d are in [0.002, 0.006]; scale fits the figure in 800 px.
 */
const PRESETS = [
  { A1:0.85, f1:3.0, p1:Math.PI/4, d1:0.003,
    A2:0.10, f2:2.0, p2:Math.PI/3, d2:0.005,
    B1:0.90, g1:2.0, e1:0.003,
    bg:'#0d0d0d', fg:'#f5e6c8', scale:340 },
  { A1:0.80, f1:5.0, p1:Math.PI/3, d1:0.004,
    A2:0.15, f2:3.0, p2:Math.PI/5, d2:0.006,
    B1:0.90, g1:4.0, e1:0.004,
    bg:'#0a0a0f', fg:'#e8e0d0', scale:340 },
  { A1:0.90, f1:5.0, p1:Math.PI/6, d1:0.005,
    A2:0.12, f2:2.0, p2:0,         d2:0.003,
    B1:0.90, g1:3.0, e1:0.005,
    bg:'#0d0d0d', fg:'#d4a836', scale:340 },
  { A1:0.90, f1:7.0, p1:Math.PI/5, d1:0.004,
    A2:0.08, f2:3.0, p2:Math.PI/2, d2:0.005,
    B1:0.90, g1:4.0, e1:0.004,
    bg:'#0a0a0f', fg:'#e8c890', scale:340 },
  { A1:0.75, f1:1.0, p1:Math.PI/2, d1:0.002,
    A2:0.18, f2:2.0, p2:Math.PI/4, d2:0.003,
    B1:0.90, g1:1.001, e1:0.002,
    bg:'#0d0d0d', fg:'#f0f0e8', scale:340 },
];

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let pidx  = 0;
let phase = 'drawing';
let t0    = null;
let drawn = 0;

function ptAt(step, pr) {
  const t  = (step / TOTAL_STEPS) * T_MAX;
  const ex = Math.exp(-pr.d1 * t);
  const ey = Math.exp(-pr.d2 * t);
  const ez = Math.exp(-pr.e1 * t);
  const x  = pr.A1 * Math.sin(pr.f1 * t + pr.p1) * ex
            + pr.A2 * Math.sin(pr.f2 * t + pr.p2) * ey;
  const y  = pr.B1 * Math.sin(pr.g1 * t) * ez;
  return [CX + x * pr.scale, CY + y * pr.scale];
}

/*
 * Line width follows the dominant damping envelope: exp(-d1*t) maps the
 * stroke thickness from MAX_WIDTH at t=0 down to MIN_WIDTH as the figure decays.
 */
function widthAt(step, pr) {
  const t   = (step / TOTAL_STEPS) * T_MAX;
  const env = Math.exp(-pr.d1 * t);
  return MIN_WIDTH + (MAX_WIDTH - MIN_WIDTH) * env;
}

function hexRgb(h) {
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function initPreset(ts) {
  const pr = PRESETS[pidx];
  ctx.fillStyle = pr.bg;
  ctx.fillRect(0, 0, W, H);
  phase = 'drawing';
  t0    = ts;
  drawn = 0;
}

function frame(ts) {
  if (t0 === null) { initPreset(ts); }

  const elapsed = (ts - t0) / 1000;
  const pr      = PRESETS[pidx];

  if (phase === 'drawing') {
    const target = Math.min(
      Math.floor((elapsed / DRAW_SECS) * TOTAL_STEPS),
      TOTAL_STEPS
    );

    ctx.globalAlpha = ALPHA;
    ctx.lineJoin    = 'round';
    ctx.lineCap     = 'round';
    ctx.strokeStyle = pr.fg;

    while (drawn < target) {
      const segEnd = Math.min(drawn + SEGMENT, target);
      const mid    = (drawn + segEnd) >> 1;
      ctx.lineWidth = widthAt(mid, pr);
      ctx.beginPath();
      const [mx, my] = ptAt(drawn, pr);
      ctx.moveTo(mx, my);
      for (let i = drawn + 1; i <= segEnd; i++) {
        const [x, y] = ptAt(i, pr);
        ctx.lineTo(x, y);
      }
      ctx.stroke();
      drawn = segEnd;
    }
    ctx.globalAlpha = 1.0;

    if (elapsed >= DRAW_SECS + HOLD_SECS) {
      phase = 'fading';
      t0    = ts;
    }
  } else if (phase === 'fading') {
    const alpha   = Math.min(elapsed / FADE_SECS, 1.0);
    const [r,g,b] = hexRgb(pr.bg);
    ctx.fillStyle  = `rgba(${r},${g},${b},${alpha})`;
    ctx.fillRect(0, 0, W, H);
    if (alpha >= 1.0) {
      pidx = (pidx + 1) % PRESETS.length;
      initPreset(ts);
    }
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
