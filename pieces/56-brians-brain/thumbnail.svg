    <rect x="135" y="20" width="5" height="5"/>
    <!-- cluster 3 head -->
    <rect x="260" y="40" width="5" height="5"/>
    <rect x="265" y="40" width="5" height="5"/>
    <!-- cluster 4 head -->
    <rect x="360" y="15" width="5" height="5"/>
    <rect x="355" y="15" width="5" height="5"/>
    <!-- cluster 5 head -->
    <rect x="60"  y="90" width="5" height="5"/>
    <rect x="65"  y="90" width="5" height="5"/>
    <!-- cluster 6 head -->
    <rect x="175" y="70" width="5" height="5"/>
    <rect x="170" y="70" width="5" height="5"/>
    <!-- cluster 7 head -->
    <rect x="290" y="100" width="5" height="5"/>
    <rect x="295" y="100" width="5" height="5"/>
    <!-- cluster 8 head -->
    <rect x="25"  y="140" width="5" height="5"/>
    <rect x="20"  y="140" width="5" height="5"/>
    <!-- cluster 9 head -->
    <rect x="125" y="125" width="5" height="5"/>
    <rect x="130" y="125" width="5" height="5"/>
    <!-- cluster 10 head -->
    <rect x="240" y="150" width="5" height="5"/>
    <rect x="235" y="150" width="5" height="5"/>
    <!-- cluster 11 head -->
    <rect x="350" y="130" width="5" height="5"/>
    <rect x="355" y="130" width="5" height="5"/>
    <!-- cluster 12 head -->
    <rect x="75"  y="200" width="5" height="5"/>
    <rect x="70"  y="200" width="5" height="5"/>
    <!-- cluster 13 head -->
    <rect x="190" y="180" width="5" height="5"/>
    <rect x="195" y="180" width="5" height="5"/>
    <!-- cluster 14 head -->
    <rect x="300" y="210" width="5" height="5"/>
    <rect x="295" y="210" width="5" height="5"/>
    <!-- cluster 15 head -->
    <rect x="40"  y="260" width="5" height="5"/>
    <rect x="45"  y="260" width="5" height="5"/>
    <!-- cluster 16 head -->
    <rect x="150" y="240" width="5" height="5"/>
    <rect x="145" y="240" width="5" height="5"/>
    <!-- cluster 17 head -->
    <rect x="275" y="270" width="5" height="5"/>
    <rect x="280" y="270" width="5" height="5"/>
    <!-- cluster 18 head -->
    <rect x="375" y="250" width="5" height="5"/>
    <rect x="370" y="250" width="5" height="5"/>
    <!-- cluster 19 head -->
    <rect x="100" y="320" width="5" height="5"/>
    <rect x="105" y="320" width="5" height="5"/>
    <!-- cluster 20 head -->
    <rect x="220" y="300" width="5" height="5"/>
    <rect x="215" y="300" width="5" height="5"/>
    <!-- cluster 21 head -->
    <rect x="340" y="330" width="5" height="5"/>
    <rect x="345" y="330" width="5" height="5"/>
