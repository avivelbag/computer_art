    <rect x="80"  y="50"  width="5" height="5"/>
    <rect x="195" y="30"  width="5" height="5"/>
    <rect x="320" y="55"  width="5" height="5"/>
    <rect x="45"  y="165" width="5" height="5"/>
    <rect x="270" y="145" width="5" height="5"/>
    <rect x="390" y="170" width="5" height="5"/>
    <rect x="170" y="215" width="5" height="5"/>
    <rect x="380" y="195" width="5" height="5"/>
    <rect x="65"  y="285" width="5" height="5"/>
    <rect x="245" y="310" width="5" height="5"/>
    <rect x="330" y="290" width="5" height="5"/>
    <rect x="160" y="355" width="5" height="5"/>
    <rect x="290" y="350" width="5" height="5"/>
    <rect x="385" y="325" width="5" height="5"/>
    <rect x="10"  y="80"  width="5" height="5"/>
    <rect x="250" y="65"  width="5" height="5"/>
    <rect x="375" y="85"  width="5" height="5"/>
    <rect x="130" y="175" width="5" height="5"/>
    <rect x="390" y="235" width="5" height="5"/>
    <rect x="20"  y="200" width="5" height="5"/>
    <rect x="340" y="265" width="5" height="5"/>
