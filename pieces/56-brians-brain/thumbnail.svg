<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: near-black #0f0f14 -->
  <rect width="400" height="400" fill="#0f0f14"/>

  <!-- DYING state cells — deep violet #5a2d82 — scattered glider trails -->
  <g fill="#5a2d82">
    <!-- cluster 1 trail (→↓) -->
    <rect x="35" y="35" width="5" height="5"/>
    <rect x="40" y="35" width="5" height="5"/>
    <rect x="40" y="40" width="5" height="5"/>
    <!-- cluster 2 trail (←↓) -->
    <rect x="145" y="25" width="5" height="5"/>
    <rect x="140" y="25" width="5" height="5"/>
    <rect x="140" y="30" width="5" height="5"/>
    <!-- cluster 3 trail (→↑) -->
    <rect x="255" y="35" width="5" height="5"/>
    <rect x="260" y="35" width="5" height="5"/>
    <rect x="260" y="30" width="5" height="5"/>
    <!-- cluster 4 trail (←↑) -->
    <rect x="365" y="10" width="5" height="5"/>
    <rect x="360" y="10" width="5" height="5"/>
    <rect x="360" y="5"  width="5" height="5"/>
    <!-- cluster 5 trail (→↓) -->
    <rect x="55"  y="95"  width="5" height="5"/>
    <rect x="60"  y="95"  width="5" height="5"/>
    <rect x="60"  y="100" width="5" height="5"/>
    <!-- cluster 6 trail (←↓) -->
    <rect x="180" y="75" width="5" height="5"/>
    <rect x="175" y="75" width="5" height="5"/>
    <rect x="175" y="80" width="5" height="5"/>
    <!-- cluster 7 trail (→↑) -->
    <rect x="285" y="95" width="5" height="5"/>
    <rect x="290" y="95" width="5" height="5"/>
    <rect x="290" y="90" width="5" height="5"/>
    <!-- cluster 8 trail (←↑) -->
    <rect x="30"  y="135" width="5" height="5"/>
    <rect x="25"  y="135" width="5" height="5"/>
    <rect x="25"  y="130" width="5" height="5"/>
    <!-- cluster 9 trail (→↓) -->
    <rect x="120" y="130" width="5" height="5"/>
    <rect x="125" y="130" width="5" height="5"/>
    <rect x="125" y="135" width="5" height="5"/>
    <!-- cluster 10 trail (←↓) -->
    <rect x="245" y="155" width="5" height="5"/>
    <rect x="240" y="155" width="5" height="5"/>
    <rect x="240" y="160" width="5" height="5"/>
    <!-- cluster 11 trail (→↑) -->
    <rect x="345" y="125" width="5" height="5"/>
    <rect x="350" y="125" width="5" height="5"/>
    <rect x="350" y="120" width="5" height="5"/>
    <!-- cluster 12 trail (←↑) -->
    <rect x="80"  y="195" width="5" height="5"/>
    <rect x="75"  y="195" width="5" height="5"/>
    <rect x="75"  y="190" width="5" height="5"/>
    <!-- cluster 13 trail (→↓) -->
    <rect x="185" y="185" width="5" height="5"/>
    <rect x="190" y="185" width="5" height="5"/>
    <rect x="190" y="190" width="5" height="5"/>
    <!-- cluster 14 trail (←↓) -->
    <rect x="305" y="215" width="5" height="5"/>
    <rect x="300" y="215" width="5" height="5"/>
    <rect x="300" y="220" width="5" height="5"/>
