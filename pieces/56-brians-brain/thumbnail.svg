    <rect x="270" y="275" width="5" height="5"/>
    <rect x="275" y="275" width="5" height="5"/>
    <rect x="275" y="280" width="5" height="5"/>
    <!-- cluster 18 trail (←↓) -->
    <rect x="380" y="255" width="5" height="5"/>
    <rect x="375" y="255" width="5" height="5"/>
    <rect x="375" y="260" width="5" height="5"/>
    <!-- cluster 19 trail (→↑) -->
    <rect x="95"  y="315" width="5" height="5"/>
    <rect x="100" y="315" width="5" height="5"/>
    <rect x="100" y="310" width="5" height="5"/>
