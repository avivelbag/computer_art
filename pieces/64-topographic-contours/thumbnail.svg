  <ellipse cx="320" cy="65"  rx="48"  ry="34"  fill="none" stroke="#1a6680" stroke-width="0.8"/>
  <ellipse cx="320" cy="65"  rx="33"  ry="22"  fill="none" stroke="#218075" stroke-width="1.8"/>
