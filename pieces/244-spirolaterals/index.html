<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spirolateral Mandalas — Integer Sequences as Geometry</title>
  <link rel="stylesheet" href="../../lib/panel.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }
    canvas {
      display: block;
      width: min(100vw, calc(100vh * 8/5));
      height: min(calc(100vw * 5/8), 100vh);
    }
    #controls {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 7px;
    }
    button {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.6);
      padding: 4px 11px;
      cursor: pointer;
      font-size: 11px;
      letter-spacing: 0.05em;
      border-radius: 2px;
    }
    button:hover { background: rgba(255,255,255,0.13); color: rgba(255,255,255,0.9); }
    button.active { border-color: rgba(127,255,212,0.5); color: rgba(127,255,212,0.9); }
  </style>
</head>
<body>
  <canvas id="c" width="800" height="500"></canvas>
  <div id="controls">
    <button id="btnSlow">Slow</button>
    <button id="btnNormal" class="active">Normal</button>
    <button id="btnFast">Fast</button>
    <button id="btnSkip">Skip →</button>
  </div>
  <script src="../../lib/panel.js"></script>
  <script>
    const PALETTE = ['#7fffd4', '#ffb3c1', '#ffd700', '#c9a7ff'];
    const BG = '#0d1117';
    const W = 800, H = 500;
    const COLS = 4, ROWS = 4;
    const CELL_W = W / COLS;
    const CELL_H = H / ROWS;
    const MARGIN = 0.82;

    // Two sets of 16 figures — sequences chosen for visual variety.
    // Each entry: [integer sequence, turning angle in degrees, label].
    const SETS = [
      [
        [[1,2,3],         90,  '[1,2,3] 90°'],
        [[1,2,3,4],       90,  '[1,2,3,4] 90°'],
        [[1,2,3,4,5],     90,  '[1,2,3,4,5] 90°'],
        [[1,2,3,2],       90,  '[1,2,3,2] 90°'],
        [[1,1,2,3,5],     90,  'Fib 90°'],
        [[2,4,6],         90,  '[2,4,6] 90°'],
        [[1,2,3],        120,  '[1,2,3] 120°'],
        [[1,3,5],        120,  '[1,3,5] 120°'],
        [[2,3,5],        120,  '[2,3,5] 120°'],
        [[1,2,3,4],      120,  '[1,2,3,4] 120°'],
        [[1,2],          144,  '[1,2] 144°'],
        [[1,2,3,4,5],     72,  '[1,2,3,4,5] 72°'],
        [[1,2,3,4,5,6],   60,  '[1..6] 60°'],
        [[1,3,2],        120,  '[1,3,2] 120°'],
        [[3,2,1],         90,  '[3,2,1] 90°'],
        [[1,2,4],        120,  '[1,2,4] 120°'],
      ],
      [
        [[1,2,3,4,5,6],   90,  '[1..6] 90°'],
        [[1,2,3,4],       72,  '[1,2,3,4] 72°'],
        [[2,3,4],         90,  '[2,3,4] 90°'],
        [[1,2,1,2],       90,  '[1,2,1,2] 90°'],
        [[4,3,2,1],       90,  '[4,3,2,1] 90°'],
        [[1,4,2],        120,  '[1,4,2] 120°'],
        [[2,1,3],        120,  '[2,1,3] 120°'],
        [[3,4,5],        120,  '[3,4,5] 120°'],
        [[1,2,3],         60,  '[1,2,3] 60°'],
        [[1,2],           90,  '[1,2] 90°'],
        [[2,3],          144,  '[2,3] 144°'],
        [[1,3,5,7],       90,  '[1,3,5,7] 90°'],
        [[1,2,3,5,8],     90,  'Fib5 90°'],
        [[1,2,3,4],       60,  '[1,2,3,4] 60°'],
        [[2,3],           72,  '[2,3] 72°'],
        [[1,2,3,2,1],     90,  '[1,2,3,2,1] 90°'],
      ],
    ];

    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    let segsPerFig = 3;  // segments drawn per figure per frame
    let currentSet = 0;
    let figures = [];
    let phase = 'drawing';  // 'drawing' | 'pause' | 'fadein'
    let pauseFrames = 0;
    let offscreen = null;
    let fadeAlpha = 0;
    let raf;

    function gcd(a, b) {
      a = Math.abs(Math.round(a));
      b = Math.abs(Math.round(b));
      while (b) { const t = b; b = a % b; a = t; }
      return a || 1;
    }

    /**
     * Minimum pass count for visual closure.
     * A spirolateral with n steps and turn A° rotates n*A per pass.
     * When n*A is not a multiple of 360, the path closes rotationally
     * after R = 360/gcd(mod, 360) passes. When it IS a multiple of 360
     * (each pass starts the same heading) we default to 4 passes for
     * visual density.
     */
    function closureRepeats(n, angle) {
      const mod = (n * angle) % 360;
      if (mod === 0) return 4;
      return Math.min(360 / gcd(mod, 360), 12);
    }

    /**
     * Walk the turtle path without drawing, returning all vertex positions.
     * Positive angle = clockwise turn (screen-space y-down convention).
     */
    function computePoints(seq, angleDeg, repeats) {
      const pts = [[0, 0]];
      let x = 0, y = 0, dir = 0;
      const rad = Math.PI / 180;
      for (let r = 0; r < repeats; r++) {
        for (const len of seq) {
          x += len * Math.cos(dir * rad);
          y += len * Math.sin(dir * rad);
          pts.push([x, y]);
          dir = (dir + angleDeg) % 360;
        }
      }
      return pts;
    }

    /**
     * Scale and translate a list of points so their bounding box fits
     * inside a cell centred at (cx, cy), respecting the margin factor.
     */
    function fitPoints(pts, cx, cy, margin) {
      const xs = pts.map(p => p[0]);
      const ys = pts.map(p => p[1]);
      const minX = Math.min(...xs), maxX = Math.max(...xs);
      const minY = Math.min(...ys), maxY = Math.max(...ys);
      const fw = maxX - minX || 1;
      const fh = maxY - minY || 1;
      const scale = Math.min(CELL_W * margin / fw, CELL_H * margin / fh);
      const ox = cx - (minX + fw / 2) * scale;
      const oy = cy - (minY + fh / 2) * scale;
      return pts.map(([x, y]) => [x * scale + ox, y * scale + oy]);
    }

    /** Build figure data objects for the given set index. */
    function buildFigures(setIdx) {
      return SETS[setIdx].map(([seq, angle, label], i) => {
        const col = i % COLS;
        const row = Math.floor(i / COLS);
        const cx = col * CELL_W + CELL_W / 2;
        const cy = row * CELL_H + CELL_H / 2;
        const repeats = closureRepeats(seq.length, angle);
        const raw = computePoints(seq, angle, repeats);
        const pts = fitPoints(raw, cx, cy, MARGIN);
        return {
          pts,
          color: PALETTE[i % PALETTE.length],
          drawn: 0,
          total: pts.length - 1,
          label,
        };
      });
    }

    function clearCanvas() {
      ctx.fillStyle = BG;
      ctx.fillRect(0, 0, W, H);
    }

    /** Render every figure at full completion in a single pass. */
    function drawAllComplete() {
      clearCanvas();
      for (const fig of figures) {
        if (fig.pts.length < 2) continue;
        ctx.strokeStyle = fig.color;
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.moveTo(fig.pts[0][0], fig.pts[0][1]);
        for (let i = 1; i < fig.pts.length; i++) {
          ctx.lineTo(fig.pts[i][0], fig.pts[i][1]);
        }
        ctx.stroke();
      }
    }

    function startSet(setIdx) {
      currentSet = setIdx;
      figures = buildFigures(setIdx);
      phase = 'drawing';
      clearCanvas();
    }

    function tick() {
      if (phase === 'drawing') {
        // Advance each figure by segsPerFig strokes this frame.
        let anyRemaining = false;
        for (const fig of figures) {
          if (fig.drawn >= fig.total) continue;
          anyRemaining = true;
          ctx.strokeStyle = fig.color;
          ctx.lineWidth = 1.2;
          const end = Math.min(fig.drawn + segsPerFig, fig.total);
          for (let i = fig.drawn; i < end; i++) {
            ctx.beginPath();
            ctx.moveTo(fig.pts[i][0], fig.pts[i][1]);
            ctx.lineTo(fig.pts[i + 1][0], fig.pts[i + 1][1]);
            ctx.stroke();
          }
          fig.drawn = end;
        }
        if (!anyRemaining) {
          phase = 'pause';
          pauseFrames = 120;  // ~2 s at 60 fps
        }

      } else if (phase === 'pause') {
        pauseFrames--;
        if (pauseFrames <= 0) {
          // Snapshot current canvas for the outgoing crossfade layer.
          offscreen = document.createElement('canvas');
          offscreen.width = W;
          offscreen.height = H;
          offscreen.getContext('2d').drawImage(canvas, 0, 0);

          // Prepare the incoming set, draw it complete as the fade target.
          const next = (currentSet + 1) % SETS.length;
          currentSet = next;
          figures = buildFigures(next);
          drawAllComplete();

          fadeAlpha = 1.0;
          phase = 'fadein';
        }

      } else if (phase === 'fadein') {
        // Each frame: redraw new set, then overlay old at decreasing alpha.
        drawAllComplete();
        ctx.globalAlpha = fadeAlpha;
        ctx.drawImage(offscreen, 0, 0);
        ctx.globalAlpha = 1.0;
        fadeAlpha -= 0.018;  // ~55 frames ≈ 0.9 s fade
        if (fadeAlpha <= 0) {
          // Fade done — reset figures so the new set draws stroke by stroke.
          figures = buildFigures(currentSet);
          phase = 'drawing';
          clearCanvas();
        }
      }

      raf = requestAnimationFrame(tick);
    }

    function setSpeedActive(id) {
      ['btnSlow','btnNormal','btnFast'].forEach(n => {
        document.getElementById(n).classList.toggle('active', n === id);
      });
    }

    document.getElementById('btnSlow').addEventListener('click', () => {
      segsPerFig = 1; setSpeedActive('btnSlow');
    });
    document.getElementById('btnNormal').addEventListener('click', () => {
      segsPerFig = 3; setSpeedActive('btnNormal');
    });
    document.getElementById('btnFast').addEventListener('click', () => {
      segsPerFig = 10; setSpeedActive('btnFast');
    });
    document.getElementById('btnSkip').addEventListener('click', () => {
      if (raf) cancelAnimationFrame(raf);
      // Snapshot whatever is on screen and fade to the next complete set.
      offscreen = document.createElement('canvas');
      offscreen.width = W;
      offscreen.height = H;
      offscreen.getContext('2d').drawImage(canvas, 0, 0);
      const next = (currentSet + 1) % SETS.length;
      currentSet = next;
      figures = buildFigures(next);
      drawAllComplete();
      fadeAlpha = 1.0;
      phase = 'fadein';
      raf = requestAnimationFrame(tick);
    });

    startSet(0);
    raf = requestAnimationFrame(tick);

    GalleryPanel.init({
      title: 'Spirolateral Mandalas — How It Works',
      sections: [
        {
          heading: 'What is a spirolateral?',
          body: 'A spirolateral is a turtle-geometry figure driven by an integer sequence. The turtle walks forward seq[0] units, turns right by the fixed angle, walks seq[1] units, turns, and so on. When the sequence is exhausted the pass repeats. Different sequences and angles produce wildly different closed or semi-closed forms — tight rosettes, open star polygons, dense layered weaves — from nothing but a short list of numbers and one turning angle.',
        },
        {
          heading: 'Closure and number theory',
          body: 'A spirolateral with n elements and turn angle A° closes after R passes where R = 360 / gcd(360, n·A mod 360). For 90° turns and a 3-element sequence, R = 4: after 4 passes the turtle has rotated 3×4×90° = 1080° = 3 full circles and returns to the origin. When n·A is itself a multiple of 360° the closure question reduces to whether the net single-pass displacement is zero — connecting to divisibility and lattice geometry.',
        },
        {
          heading: 'Reading the grid',
          body: 'Each cell shows one sequence and angle. Sequences sharing the same turn angle form a visual family: square lattice figures at 90°, triangular lattices at 120°, pentagonal roses at 72° and 144°, hexagonal stars at 60°. The palette — mint, rose, gold, violet — cycles across the 4×4 grid regardless of family.',
        },
        {
          heading: 'Controls',
          body: 'Slow / Normal / Fast set how many strokes are drawn per figure per animation frame. Skip → immediately crossfades to the next gallery set. The loop is seamless — every 2 seconds after a set completes it fades into the next one.',
        },
      ],
    });
  </script>
</body>
</html>
