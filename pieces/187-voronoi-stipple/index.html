<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Voronoi Stipple — Weighted Dot Etching</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0e8;overflow:hidden;display:flex;align-items:center;justify-content:center;width:100vw;height:100vh}
canvas{display:block;width:min(100vw,100vh);height:min(100vw,100vh)}
</style>
</head>
<body>
<canvas id="c" width="600" height="600"></canvas>
<script>(function(){
'use strict';

const W=600,H=600,N=600;
const RMIN=1,RMAX=6;
const MAX_ITER=45;
const FPS=30,FRAME_MS=1000/FPS;
const INK='#2b2318',PAPER='#f5f0e8';

// 10-pixel coarse spatial grid for O(1) nearest-seed lookup
const BCELL=10,BCOLS=W/BCELL,BROWS=H/BCELL;
const NBUCKETS=BCOLS*BROWS;

// Analytically defined density — sum of 2-D Gaussians in normalised [0,1] coords.
// The head oval concentrates most seeds toward the canvas centre; the eye and
// mouth peaks create extra density to produce a face-like ovoid silhouette.
// All parameters chosen so that the function stays within [0, 1].
function dens(x,y){
  const nx=x/W,ny=y/H;
  const head=Math.exp(-((nx-.5)*(nx-.5)/.045+(ny-.5)*(ny-.5)/.07));
  const le=1.7*Math.exp(-((nx-.37)*(nx-.37)/.004+(ny-.38)*(ny-.38)/.003));
  const re=1.7*Math.exp(-((nx-.63)*(nx-.63)/.004+(ny-.38)*(ny-.38)/.003));
  const mo=1.4*Math.exp(-((nx-.5)*(nx-.5)/.018+(ny-.65)*(ny-.65)/.002));
  return Math.min(1,head+le+re+mo);
}

// Pre-compute density map once to avoid repeated exp() calls every Lloyd step
const DEN=new Float32Array(W*H);
for(let py=0;py<H;py++)
  for(let px=0;px<W;px++)
    DEN[py*W+px]=dens(px,py);

// Seed positions — rejection-sample from the density distribution so that
// seeds start roughly where they will converge, reducing iterations needed
const sx=new Float32Array(N),sy=new Float32Array(N);
{
  let placed=0;
  while(placed<N){
    const x=Math.random()*W,y=Math.random()*H;
    if(Math.random()<dens(x,y)){sx[placed]=x;sy[placed]=y;placed++;}
  }
}

// Bucket lists rebuilt every Lloyd step
const buckets=[];
for(let i=0;i<NBUCKETS;i++) buckets.push([]);

function buildGrid(){
  for(let i=0;i<NBUCKETS;i++) buckets[i].length=0;
  for(let i=0;i<N;i++){
    const bx=Math.max(0,Math.min(BCOLS-1,sx[i]/BCELL|0));
    const by=Math.max(0,Math.min(BROWS-1,sy[i]/BCELL|0));
    buckets[by*BCOLS+bx].push(i);
  }
}

// Find nearest seed for pixel (px,py) by scanning a ±2-bucket neighbourhood.
// The neighbourhood radius covers ±20 px, well beyond the average Voronoi cell
// radius of sqrt(W*H/N) ≈ 24 px, so the true nearest seed is always found.
function nearestSeed(px,py){
  const gbx=px/BCELL|0,gby=py/BCELL|0;
  const x0=Math.max(0,gbx-2),x1=Math.min(BCOLS-1,gbx+2);
  const y0=Math.max(0,gby-2),y1=Math.min(BROWS-1,gby+2);
  let minD=1e18,minI=0;
  for(let by=y0;by<=y1;by++){
    for(let bx=x0;bx<=x1;bx++){
      const buck=buckets[by*BCOLS+bx];
      for(let k=0;k<buck.length;k++){
        const si=buck[k];
        const dx=px-sx[si],dy=py-sy[si];
        const d=dx*dx+dy*dy;
        if(d<minD){minD=d;minI=si;}
      }
    }
  }
  return minI;
}

// Weighted centroid accumulators (64-bit to avoid float precision drift)
const wx=new Float64Array(N),wy=new Float64Array(N),wt=new Float64Array(N);

// One Lloyd relaxation step: rasterise the Voronoi diagram and move each seed
// to the density-weighted centroid of its cell.
function lloydStep(){
  buildGrid();
  wx.fill(0);wy.fill(0);wt.fill(0);
  for(let py=0;py<H;py++){
    for(let px=0;px<W;px++){
      const si=nearestSeed(px,py);
      const w=DEN[py*W+px];
      wx[si]+=w*px;wy[si]+=w*py;wt[si]+=w;
    }
  }
  for(let i=0;i<N;i++){
    if(wt[i]>0){sx[i]=wx[i]/wt[i];sy[i]=wy[i]/wt[i];}
  }
}

const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');

// Render current seed positions as filled dots; radius scales with local density
// so dark (high-density) regions get thick dots and light regions get fine dots.
function render(){
  ctx.fillStyle=PAPER;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle=INK;
  for(let i=0;i<N;i++){
    const r=RMIN+(RMAX-RMIN)*DEN[(sy[i]|0)*W+(sx[i]|0)];
    ctx.beginPath();
    ctx.arc(sx[i],sy[i],r,0,Math.PI*2);
    ctx.fill();
  }
}

let iter=0,lastT=0;
function frame(now){
  if(now-lastT<FRAME_MS){requestAnimationFrame(frame);return;}
  lastT=now;
  lloydStep();
  render();
  iter++;
  if(iter<MAX_ITER) requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
})();</script>
</body>
</html>
