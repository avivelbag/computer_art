<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background: near-black -->
  <rect width="400" height="400" fill="#0a0800"/>

  <!-- Amber halos (intermediate V concentration, outer rings of coral blobs) -->
  <ellipse cx="200" cy="200" rx="72" ry="50" fill="#c8780a" transform="rotate(15 200 200)"/>
  <ellipse cx="90"  cy="105" rx="44" ry="28" fill="#c8780a" transform="rotate(-20 90 105)"/>
  <ellipse cx="315" cy="125" rx="38" ry="24" fill="#c8780a" transform="rotate(38 315 125)"/>
  <ellipse cx="345" cy="285" rx="46" ry="30" fill="#c8780a" transform="rotate(-12 345 285)"/>
  <ellipse cx="65"  cy="305" rx="40" ry="24" fill="#c8780a" transform="rotate(28 65 305)"/>
  <ellipse cx="175" cy="345" rx="32" ry="20" fill="#c8780a" transform="rotate(-8 175 345)"/>
  <ellipse cx="285" cy="55"  rx="34" ry="20" fill="#c8780a" transform="rotate(48 285 55)"/>
  <ellipse cx="125" cy="255" rx="28" ry="18" fill="#c8780a" transform="rotate(22 125 255)"/>
  <ellipse cx="365" cy="175" rx="24" ry="16" fill="#c8780a" transform="rotate(-30 365 175)"/>
  <ellipse cx="45"  cy="195" rx="22" ry="14" fill="#c8780a" transform="rotate(8 45 195)"/>

  <!-- Ivory peaks (high V concentration, bright cores of coral blobs) -->
  <ellipse cx="200" cy="200" rx="50" ry="34" fill="#f5e6c3" transform="rotate(15 200 200)"/>
  <ellipse cx="90"  cy="105" rx="28" ry="17" fill="#f5e6c3" transform="rotate(-20 90 105)"/>
  <ellipse cx="315" cy="125" rx="24" ry="14" fill="#f5e6c3" transform="rotate(38 315 125)"/>
  <ellipse cx="345" cy="285" rx="30" ry="19" fill="#f5e6c3" transform="rotate(-12 345 285)"/>
  <ellipse cx="65"  cy="305" rx="26" ry="15" fill="#f5e6c3" transform="rotate(28 65 305)"/>
  <ellipse cx="175" cy="345" rx="20" ry="12" fill="#f5e6c3" transform="rotate(-8 175 345)"/>
  <ellipse cx="285" cy="55"  rx="22" ry="12" fill="#f5e6c3" transform="rotate(48 285 55)"/>
  <ellipse cx="125" cy="255" rx="17" ry="11" fill="#f5e6c3" transform="rotate(22 125 255)"/>
  <ellipse cx="365" cy="175" rx="14" ry="9"  fill="#f5e6c3" transform="rotate(-30 365 175)"/>
  <ellipse cx="45"  cy="195" rx="12" ry="8"  fill="#f5e6c3" transform="rotate(8 45 195)"/>

  <!-- Scattered small ivory spots to suggest mitosis/spot sub-patterns -->
  <circle cx="250" cy="150" r="8"  fill="#f5e6c3"/>
  <circle cx="155" cy="275" r="7"  fill="#f5e6c3"/>
  <circle cx="315" cy="225" r="6"  fill="#f5e6c3"/>
  <circle cx="75"  cy="50"  r="5"  fill="#f5e6c3"/>
  <circle cx="355" cy="355" r="6"  fill="#f5e6c3"/>
  <circle cx="35"  cy="385" r="5"  fill="#f5e6c3"/>
  <circle cx="390" cy="85"  r="4"  fill="#f5e6c3"/>
  <circle cx="230" cy="385" r="5"  fill="#f5e6c3"/>

  <!-- Amber ring halos around scattered spots -->
  <circle cx="250" cy="150" r="14" fill="none" stroke="#c8780a" stroke-width="3"/>
  <circle cx="155" cy="275" r="13" fill="none" stroke="#c8780a" stroke-width="3"/>
  <circle cx="315" cy="225" r="12" fill="none" stroke="#c8780a" stroke-width="3"/>
</svg>
