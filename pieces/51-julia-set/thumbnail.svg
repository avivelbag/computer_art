<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#160638"/>
      <stop offset="100%" stop-color="#030108"/>
    </radialGradient>
    <radialGradient id="trap" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#040110"/>
      <stop offset="22%"  stop-color="#200860"/>
      <stop offset="40%"  stop-color="#6818a8"/>
      <stop offset="52%"  stop-color="#d07010"/>
      <stop offset="58%"  stop-color="#f8e880"/>
      <stop offset="64%"  stop-color="#c85a08"/>
      <stop offset="76%"  stop-color="#4010a0"/>
      <stop offset="88%"  stop-color="#180440"/>
      <stop offset="100%" stop-color="#030108"/>
    </radialGradient>
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="sglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="400" fill="url(#bg)"/>

  <circle cx="200" cy="200" r="185" fill="url(#trap)"/>

  <ellipse cx="200" cy="200" rx="72" ry="70" fill="#030108"/>

  <ellipse cx="200" cy="200" rx="75" ry="73"
           fill="none" stroke="#f5e878" stroke-width="7" opacity="0.85" filter="url(#glow)"/>

  <ellipse cx="200" cy="127" rx="14" ry="13" fill="#030108"/>
  <ellipse cx="200" cy="127" rx="16" ry="15"
           fill="none" stroke="#f0e060" stroke-width="3" opacity="0.7" filter="url(#sglow)"/>

  <ellipse cx="200" cy="273" rx="14" ry="13" fill="#030108"/>
  <ellipse cx="200" cy="273" rx="16" ry="15"
           fill="none" stroke="#f0e060" stroke-width="3" opacity="0.7" filter="url(#sglow)"/>

  <circle cx="132" cy="168" r="8" fill="#030108" opacity="0.85"/>
  <circle cx="268" cy="232" r="8" fill="#030108" opacity="0.85"/>
  <circle cx="148" cy="244" r="5" fill="#030108" opacity="0.75"/>
  <circle cx="252" cy="156" r="5" fill="#030108" opacity="0.75"/>

  <line x1="200" y1="143" x2="200" y2="113" stroke="#8030c0" stroke-width="1" opacity="0.5"/>
  <line x1="200" y1="257" x2="200" y2="287" stroke="#8030c0" stroke-width="1" opacity="0.5"/>
  <line x1="143" y1="200" x2="113" y2="200" stroke="#8030c0" stroke-width="1" opacity="0.5"/>
  <line x1="257" y1="200" x2="287" y2="200" stroke="#8030c0" stroke-width="1" opacity="0.5"/>
  <line x1="152" y1="152" x2="130" y2="130" stroke="#8030c0" stroke-width="1" opacity="0.35"/>
  <line x1="248" y1="152" x2="270" y2="130" stroke="#8030c0" stroke-width="1" opacity="0.35"/>
  <line x1="152" y1="248" x2="130" y2="270" stroke="#8030c0" stroke-width="1" opacity="0.35"/>
  <line x1="248" y1="248" x2="270" y2="270" stroke="#8030c0" stroke-width="1" opacity="0.35"/>
</svg>
