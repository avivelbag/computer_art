<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0510"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>

    <!-- Amber basin sector -->
    <radialGradient id="ga" cx="70%" cy="30%" r="80%">
      <stop offset="0%"   stop-color="#f29d0a" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#a06008" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Teal basin sector -->
    <radialGradient id="gt" cx="10%" cy="70%" r="80%">
      <stop offset="0%"   stop-color="#08c8b8" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#047870" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </radialGradient>

    <!-- Violet basin sector -->
    <radialGradient id="gv" cx="90%" cy="80%" r="80%">
      <stop offset="0%"   stop-color="#8c20d0" stop-opacity="0.95"/>
      <stop offset="60%"  stop-color="#4a0880" stop-opacity="0.80"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg)"/>

  <!-- Three basin sectors as pie slices (z³-1 triskelion) -->
  <!-- Sector 0: 0° → 120° amber -->
  <path d="M200,200 L370,110 A185,185 0 0,1 200,385 Z"
        fill="url(#ga)" opacity="0.90"/>
  <!-- Sector 1: 120° → 240° teal -->
  <path d="M200,200 L200,385 A185,185 0 0,1 30,110 Z"
        fill="url(#gt)" opacity="0.90"/>
  <!-- Sector 2: 240° → 360° violet -->
  <path d="M200,200 L30,110 A185,185 0 0,1 370,110 Z"
        fill="url(#gv)" opacity="0.90"/>

  <!-- Fractal boundary suggestion: dark boundary lines radiating from centre -->
  <line x1="200" y1="200" x2="370" y2="110" stroke="#000" stroke-width="2.5" opacity="0.7"/>
  <line x1="200" y1="200" x2="200" y2="385" stroke="#000" stroke-width="2.5" opacity="0.7"/>
  <line x1="200" y1="200" x2="30"  y2="110" stroke="#000" stroke-width="2.5" opacity="0.7"/>

  <!-- Fractal tendrils — thin dark veins near boundaries -->
  <path d="M200,200 Q240,155 260,115" stroke="#000" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M200,200 Q220,175 250,145" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M200,200 Q160,155 140,115" stroke="#000" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M200,200 Q180,175 150,145" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>
  <path d="M200,200 Q185,240 200,280" stroke="#000" stroke-width="1" fill="none" opacity="0.6"/>
  <path d="M200,200 Q190,245 195,280" stroke="#000" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Sub-basin blobs (self-similar islands) -->
  <circle cx="295" cy="142" r="22" fill="#f29d0a" opacity="0.55" filter="url(#soft)"/>
  <circle cx="295" cy="142" r="14" fill="#000" opacity="0.50"/>
  <circle cx="295" cy="142" r="9"  fill="#f29d0a" opacity="0.50"/>

  <circle cx="105" cy="142" r="22" fill="#08c8b8" opacity="0.55" filter="url(#soft)"/>
  <circle cx="105" cy="142" r="14" fill="#000" opacity="0.50"/>
  <circle cx="105" cy="142" r="9"  fill="#08c8b8" opacity="0.50"/>

  <circle cx="200" cy="328" r="22" fill="#8c20d0" opacity="0.55" filter="url(#soft)"/>
  <circle cx="200" cy="328" r="14" fill="#000" opacity="0.50"/>
  <circle cx="200" cy="328" r="9"  fill="#8c20d0" opacity="0.50"/>

  <!-- Roots: three bright dots at the cube roots of unity -->
  <circle cx="370" cy="200" r="7" fill="#f8e040" opacity="0.9" filter="url(#glow)"/>
  <circle cx="115" cy="361" r="7" fill="#f8e040" opacity="0.9" filter="url(#glow)"/>
  <circle cx="115" cy="039" r="7" fill="#f8e040" opacity="0.9" filter="url(#glow)"/>

  <!-- Centre singularity -->
  <circle cx="200" cy="200" r="5" fill="#ffffff" opacity="0.85" filter="url(#glow)"/>
</svg>
