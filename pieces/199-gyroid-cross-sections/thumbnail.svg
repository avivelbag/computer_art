<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .bg       { fill: #0d0510; }
      .int      { fill: #13083a; fill-opacity: 0.55; }
      .primary  { fill: none; stroke: #f0c832; stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; }
      .secondary{ fill: none; stroke: #4a8de8; stroke-width: 1.4; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <!-- Background -->
  <rect class="bg" width="400" height="400"/>

  <!-- Interior tinted region (approximate f < 0 regions) -->
  <path class="int" d="M 0,0 L 0,200 C 70,180 70,160 100,150 C 130,140 170,175 200,200 L 200,0 Z"/>
  <path class="int" d="M 200,200 C 230,225 270,265 300,250 C 330,235 350,215 400,200 L 400,400 L 200,400 Z"/>

  <!-- Secondary isocontours at f = ±0.5 (cool blue) — topographic depth -->
  <path class="secondary"
        d="M 0,15 C 35,45 75,64 100,64 C 125,64 165,34 200,15
           C 235,34 275,64 300,64 C 325,64 365,45 400,15"/>
  <path class="secondary"
        d="M 0,385 C 35,355 75,336 100,336 C 125,336 165,366 200,385
           C 235,366 275,336 300,336 C 325,336 365,355 400,385"/>
  <path class="secondary"
        d="M 0,186 C 68,166 76,147 108,137 C 140,127 178,162 208,186
           C 238,210 272,248 300,238 C 328,228 350,204 400,186"/>
  <path class="secondary"
        d="M 0,214 C 55,196 76,173 105,163 C 134,153 172,189 202,214"/>

  <!-- Primary isocurves (gold) — the gyroid level set at z ≈ 0 -->
  <!-- Main diagonal S-curve through center -->
  <path class="primary"
        d="M 0,200 C 68,182 72,160 100,150
           C 128,140 170,175 200,200
           C 230,225 272,264 300,250
           C 328,236 350,216 400,200"/>
  <!-- Top W-arc: corners dip down to ~y=50, passing through top-edge midpoint -->
  <path class="primary"
        d="M 0,0 C 30,30 70,50 100,50
           C 130,50 168,20 200,0
           C 232,20 270,50 300,50
           C 330,50 370,30 400,0"/>
  <!-- Bottom W-arc: mirror of top arc -->
  <path class="primary"
        d="M 0,400 C 30,370 70,350 100,350
           C 130,350 168,380 200,400
           C 232,380 270,350 300,350
           C 330,350 370,370 400,400"/>
</svg>
