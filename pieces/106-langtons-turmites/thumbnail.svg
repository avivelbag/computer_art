    <rect x="286" y="286" width="4" height="4"/>
    <rect x="294" y="294" width="4" height="4"/>
    <rect x="278" y="294" width="4" height="4"/>
    <rect x="294" y="278" width="4" height="4"/>
    <rect x="278" y="278" width="4" height="4"/>
    <rect x="302" y="302" width="4" height="4"/>
    <rect x="270" y="302" width="4" height="4"/>
    <rect x="302" y="270" width="4" height="4"/>
    <rect x="270" y="270" width="4" height="4"/>
    <rect x="310" y="310" width="4" height="4"/>
    <rect x="262" y="310" width="4" height="4"/>
    <rect x="310" y="262" width="4" height="4"/>
    <rect x="262" y="262" width="4" height="4"/>
    <rect x="286" y="302" width="4" height="4"/>
    <rect x="286" y="270" width="4" height="4"/>
    <rect x="302" y="286" width="4" height="4"/>
    <rect x="270" y="286" width="4" height="4"/>
  </g>
  <g fill="#6820b8" opacity="0.7">
    <rect x="284" y="284" width="4" height="4"/>
    <rect x="292" y="288" width="4" height="4"/>
    <rect x="288" y="296" width="4" height="4"/>
    <rect x="280" y="288" width="4" height="4"/>
    <rect x="288" y="280" width="4" height="4"/>
  </g>

  <!-- Rose ant (LRRL) — center, expanding outward -->
  <g fill="#e85090">
    <rect x="196" y="196" width="4" height="4"/>
    <rect x="204" y="196" width="4" height="4"/>
    <rect x="196" y="204" width="4" height="4"/>
    <rect x="204" y="204" width="4" height="4"/>
    <rect x="200" y="190" width="4" height="4"/>
    <rect x="200" y="210" width="4" height="4"/>
    <rect x="190" y="200" width="4" height="4"/>
    <rect x="210" y="200" width="4" height="4"/>
    <rect x="192" y="192" width="4" height="4"/>
    <rect x="208" y="192" width="4" height="4"/>
    <rect x="192" y="208" width="4" height="4"/>
    <rect x="208" y="208" width="4" height="4"/>
    <rect x="200" y="184" width="4" height="4"/>
    <rect x="200" y="216" width="4" height="4"/>
    <rect x="184" y="200" width="4" height="4"/>
    <rect x="216" y="200" width="4" height="4"/>
  </g>
  <g fill="#a82060" opacity="0.7">
    <rect x="194" y="194" width="4" height="4"/>
    <rect x="206" y="194" width="4" height="4"/>
    <rect x="194" y="206" width="4" height="4"/>
    <rect x="206" y="206" width="4" height="4"/>
    <rect x="200" y="194" width="4" height="4"/>
  </g>
</svg>
