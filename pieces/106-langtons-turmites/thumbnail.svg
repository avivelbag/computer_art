    <rect x="296" y="88"  width="4" height="4"/>
    <rect x="292" y="96"  width="4" height="4"/>
    <rect x="300" y="92"  width="4" height="4"/>
    <rect x="284" y="92"  width="4" height="4"/>
    <rect x="292" y="80"  width="4" height="4"/>
  </g>

  <!-- Green ant (LLRR) — symmetric blocky pattern, lower-left -->
  <g fill="#30c840">
    <rect x="86"  y="286" width="4" height="4"/>
    <rect x="90"  y="294" width="4" height="4"/>
    <rect x="82"  y="294" width="4" height="4"/>
    <rect x="90"  y="282" width="4" height="4"/>
    <rect x="82"  y="282" width="4" height="4"/>
    <rect x="94"  y="298" width="4" height="4"/>
    <rect x="78"  y="298" width="4" height="4"/>
    <rect x="94"  y="278" width="4" height="4"/>
    <rect x="78"  y="278" width="4" height="4"/>
    <rect x="98"  y="306" width="4" height="4"/>
    <rect x="74"  y="306" width="4" height="4"/>
    <rect x="98"  y="270" width="4" height="4"/>
    <rect x="74"  y="270" width="4" height="4"/>
    <rect x="86"  y="302" width="4" height="4"/>
    <rect x="86"  y="274" width="4" height="4"/>
  </g>
  <g fill="#108828" opacity="0.7">
