<svg xmlns="http://www.w3.org/2000/svg" width="400" height="400" viewBox="0 0 400 400">
  <defs>
    <!-- One radialGradient glow per ant, centered at the ant's starting quadrant. -->
    <radialGradient id="ga" cx="100" cy="100" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e88820" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#e88820" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050508"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gb" cx="300" cy="100" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#20c8e8" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#20c8e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050508"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gc" cx="100" cy="300" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#30c840" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#30c840" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050508"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="gd" cx="300" cy="300" r="140" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#a050e8" stop-opacity="0.95"/>
      <stop offset="45%"  stop-color="#a050e8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#050508"  stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ge" cx="200" cy="200" r="90" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#e85090" stop-opacity="0.95"/>
      <stop offset="50%"  stop-color="#e85090" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#050508"  stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#050508"/>

  <!-- Per-ant glow regions -->
  <rect width="400" height="400" fill="url(#ga)"/>
  <rect width="400" height="400" fill="url(#gb)"/>
  <rect width="400" height="400" fill="url(#gc)"/>
  <rect width="400" height="400" fill="url(#gd)"/>
  <rect width="400" height="400" fill="url(#ge)"/>

  <!-- Amber ant (RL) — chaotic core then diagonal highway toward upper-right -->
  <g fill="#e88820">
    <rect x="86"  y="86"  width="4" height="4"/>
    <rect x="90"  y="82"  width="4" height="4"/>
    <rect x="86"  y="90"  width="4" height="4"/>
    <rect x="94"  y="86"  width="4" height="4"/>
    <rect x="90"  y="78"  width="4" height="4"/>
    <rect x="96"  y="74"  width="4" height="4"/>
    <rect x="100" y="70"  width="4" height="4"/>
    <rect x="106" y="64"  width="4" height="4"/>
    <rect x="112" y="58"  width="4" height="4"/>
    <rect x="118" y="52"  width="4" height="4"/>
    <rect x="124" y="46"  width="4" height="4"/>
    <rect x="130" y="40"  width="4" height="4"/>
    <rect x="82"  y="94"  width="4" height="4"/>
    <rect x="78"  y="100" width="4" height="4"/>
    <rect x="74"  y="106" width="4" height="4"/>
    <rect x="70"  y="112" width="4" height="4"/>
  </g>
  <g fill="#c86000" opacity="0.7">
    <rect x="84"  y="84"  width="4" height="4"/>
    <rect x="92"  y="88"  width="4" height="4"/>
    <rect x="88"  y="96"  width="4" height="4"/>
    <rect x="96"  y="92"  width="4" height="4"/>
    <rect x="80"  y="88"  width="4" height="4"/>
    <rect x="88"  y="80"  width="4" height="4"/>
  </g>

  <!-- Cyan ant (RLR) — swirling spiral pattern, upper-right -->
  <g fill="#20c8e8">
    <rect x="286" y="86"  width="4" height="4"/>
    <rect x="294" y="82"  width="4" height="4"/>
    <rect x="298" y="90"  width="4" height="4"/>
    <rect x="290" y="94"  width="4" height="4"/>
    <rect x="302" y="86"  width="4" height="4"/>
    <rect x="306" y="78"  width="4" height="4"/>
    <rect x="310" y="70"  width="4" height="4"/>
    <rect x="310" y="94"  width="4" height="4"/>
    <rect x="314" y="86"  width="4" height="4"/>
    <rect x="282" y="94"  width="4" height="4"/>
    <rect x="278" y="102" width="4" height="4"/>
    <rect x="274" y="110" width="4" height="4"/>
    <rect x="282" y="78"  width="4" height="4"/>
    <rect x="278" y="70"  width="4" height="4"/>
  </g>
  <g fill="#008ab0" opacity="0.7">
