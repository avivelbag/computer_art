<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Between the Tiles</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <script>
    const INK   = '#1a1a2e';
    const CREAM = '#f0e6d0';
    const CELL  = 40;
    const FLIP_INTERVAL = 80;

    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    let cols, rows, tiles, lastFlip = 0;

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
      cols  = Math.ceil(canvas.width  / CELL);
      rows  = Math.ceil(canvas.height / CELL);
      tiles = new Uint8Array(cols * rows).map(() => Math.random() < 0.5 ? 0 : 1);
    }

    /**
     * Draw a single Truchet tile at grid position (col, row).
     * orientation 0: arc from bottom-left corner to top-right corner (two quarter-circles).
     * orientation 1: arc from top-left corner to bottom-right corner (two quarter-circles).
     * Each tile fills a CELL×CELL square with INK background and CREAM arcs.
     */
    function drawTile(col, row, orientation) {
      const x = col * CELL;
      const y = row * CELL;
      const r = CELL / 2;

      ctx.fillStyle = INK;
      ctx.fillRect(x, y, CELL, CELL);

      ctx.strokeStyle = CREAM;
      ctx.lineWidth   = CELL * 0.18;
      ctx.lineCap     = 'round';

      ctx.beginPath();
      if (orientation === 0) {
        ctx.arc(x,        y + CELL, r, -Math.PI / 2, 0);
        ctx.moveTo(x + CELL, y);
        ctx.arc(x + CELL, y,        r, Math.PI,       Math.PI * 3 / 2);
      } else {
        ctx.arc(x,        y,        r, 0,             Math.PI / 2);
        ctx.moveTo(x + CELL, y + CELL);
        ctx.arc(x + CELL, y + CELL, r, Math.PI,       Math.PI * 3 / 2, true);
      }
      ctx.stroke();
    }

    function drawAll() {
      for (let row = 0; row < rows; row++) {
        for (let col = 0; col < cols; col++) {
          drawTile(col, row, tiles[row * cols + col]);
        }
      }
    }

    function animate(ts) {
      if (ts - lastFlip >= FLIP_INTERVAL) {
        const idx = Math.floor(Math.random() * tiles.length);
        tiles[idx] ^= 1;
        const col = idx % cols;
        const row = Math.floor(idx / cols);
        drawTile(col, row, tiles[idx]);
        lastFlip = ts;
      }
      requestAnimationFrame(animate);
    }

    window.addEventListener('resize', () => { resize(); drawAll(); });
    resize();
    drawAll();
    requestAnimationFrame(animate);
  </script>
</body>
</html>
