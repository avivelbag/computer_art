<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <rect width="400" height="300" fill="#1a1040"/>

  <!-- Ferromagnetic domain patches (warm linen on deep indigo) -->
  <!-- Primary domains – large coherent regions below Tc -->
  <rect x="0"   y="0"   width="168" height="130" fill="#f5ead8"/>
  <rect x="182" y="0"   width="92"  height="72"  fill="#f5ead8"/>
  <rect x="292" y="18"  width="108" height="54"  fill="#f5ead8"/>
  <rect x="52"  y="148" width="188" height="92"  fill="#f5ead8"/>
  <rect x="262" y="104" width="138" height="130" fill="#f5ead8"/>
  <rect x="196" y="244" width="64"  height="56"  fill="#f5ead8"/>

  <!-- Anti-domain islands inside primary domains (critical fluctuations) -->
  <rect x="28"  y="22"  width="36"  height="28"  fill="#1a1040"/>
  <rect x="96"  y="58"  width="22"  height="18"  fill="#1a1040"/>
  <rect x="130" y="88"  width="16"  height="14"  fill="#1a1040"/>
  <rect x="200" y="22"  width="28"  height="20"  fill="#1a1040"/>
  <rect x="72"  y="162" width="32"  height="24"  fill="#1a1040"/>
  <rect x="152" y="200" width="18"  height="14"  fill="#1a1040"/>
  <rect x="296" y="128" width="38"  height="28"  fill="#1a1040"/>
  <rect x="330" y="208" width="22"  height="18"  fill="#1a1040"/>

  <!-- Small scattered domains at critical scale -->
  <rect x="18"  y="200" width="24"  height="20"  fill="#f5ead8"/>
  <rect x="170" y="185" width="14"  height="12"  fill="#f5ead8"/>
  <rect x="238" y="242" width="18"  height="14"  fill="#f5ead8"/>
  <rect x="8"   y="160" width="12"  height="10"  fill="#f5ead8"/>
  <rect x="360" y="80"  width="10"  height="8"   fill="#1a1040"/>
  <rect x="284" y="86"  width="8"   height="6"   fill="#f5ead8"/>

  <!-- Subtle bottom gradient so text reads clearly -->
  <defs>
    <linearGradient id="fade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0.6" stop-color="#1a1040" stop-opacity="0"/>
      <stop offset="1"   stop-color="#1a1040" stop-opacity="0.82"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#fade)"/>

  <!-- Legend dots -->
  <rect x="24" y="268" width="10" height="10" rx="1" fill="#f5ead8"/>
  <text x="40" y="277" font-family="system-ui,sans-serif" font-size="9" fill="#c8b898">spin +1</text>
  <rect x="94" y="268" width="10" height="10" rx="1" fill="#1a1040" stroke="#3a2a7a" stroke-width="1"/>
  <text x="110" y="277" font-family="system-ui,sans-serif" font-size="9" fill="#c8b898">spin −1</text>

  <!-- Temperature label -->
  <text x="390" y="277" font-family="system-ui,sans-serif" font-size="9" fill="#d4b896" text-anchor="end">Tc ≈ 2.269 · critical opalescence</text>
</svg>
