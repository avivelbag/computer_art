<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spirograph: Closed and Infinite — Hypotrochoid Roulette Curves</title>
<style>
html,body{margin:0;padding:0;background:#000;display:flex;align-items:center;justify-content:center;min-height:100vh}
canvas{display:block;max-width:96vmin;max-height:96vmin}
</style>
</head>
<body>
<canvas id="c" width="800" height="800"></canvas>
<script>
const W = 800, H = 800, CX = 400, CY = 400;
const TWO_PI = 2 * Math.PI;

/* Steps per full 2π revolution of the inner circle's centre — controls curve smoothness. */
const STEPS_PER_TURN = 1500;

/* Seconds to draw a complete curve stroke-by-stroke. */
const DRAW_SECS = 22;

/* Seconds to hold the finished curve before fading. */
const HOLD_SECS = 2;

/* Seconds for the cross-fade to the next preset. */
const FADE_SECS = 1.2;

function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }

/* Each preset: R/r must be a ratio of small coprime integers for guaranteed closure.
   dr is the pen distance as a fraction of r; values >1 extend outside the inner circle. */
const PRESETS = [
  { R: 5,  r: 3, dr: 0.90, bg: '#fdf6f0', fg: '#c4706a' }, // rose on cream
  { R: 7,  r: 2, dr: 0.85, bg: '#0d2240', fg: '#3ecabf' }, // teal on navy
  { R: 8,  r: 3, dr: 1.10, bg: '#1c1c1c', fg: '#d4a256' }, // gold on charcoal
  { R: 11, r: 4, dr: 0.75, bg: '#1a0a2e', fg: '#e891b4' }, // pink on deep purple
  { R: 13, r: 5, dr: 0.95, bg: '#0f2210', fg: '#7ec86d' }, // green on dark green
  { R: 9,  r: 4, dr: 1.20, bg: '#18000f', fg: '#f0c060' }, // amber on near-black
];

/**
 * Precompute all fixed parameters for a given preset.
 *
 * The curve closes after n_turns = r/gcd(R,r) revolutions of the inner
 * circle's centre. The total step count and parameter period follow from that.
 */
function buildParams(p) {
  const g      = gcd(p.R, p.r);
  const turns  = p.r / g;
  const d      = p.dr * p.r;
  const Rr     = p.R - p.r;
  const k      = Rr / p.r;       // angular velocity ratio
  const scale  = (W / 2 - 24) / (Rr + d);  // fit max radius inside canvas
  const steps  = Math.round(turns * STEPS_PER_TURN);
  const period = TWO_PI * turns;
  return { d, Rr, k, scale, steps, period };
}

/**
 * Evaluate the hypotrochoid at step index i.
 *
 * x(t) = (R-r)·cos(t) + d·cos((R-r)/r · t)
 * y(t) = (R-r)·sin(t) − d·sin((R-r)/r · t)
 */
function ptAt(i, par) {
  const t = (i / par.steps) * par.period;
  return [
    CX + par.scale * (par.Rr * Math.cos(t) + par.d * Math.cos(par.k * t)),
    CY + par.scale * (par.Rr * Math.sin(t) - par.d * Math.sin(par.k * t)),
  ];
}

function hexRgb(hex) {
  return [
    parseInt(hex.slice(1, 3), 16),
    parseInt(hex.slice(3, 5), 16),
    parseInt(hex.slice(5, 7), 16),
  ];
}

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

let pidx     = 0;      // current preset index
let phase    = 'drawing'; // 'drawing' | 'fading'
let t0       = null;   // timestamp at phase start
let lastStep = -1;     // last step already stroked onto the canvas
let par      = null;   // params for current preset

function initPreset(ts) {
  const p = PRESETS[pidx];
  par = buildParams(p);
  ctx.fillStyle   = p.bg;
  ctx.fillRect(0, 0, W, H);
  ctx.strokeStyle = p.fg;
  ctx.lineWidth   = 1.5;
  ctx.lineJoin    = 'round';
  ctx.lineCap     = 'round';
  phase    = 'drawing';
  t0       = ts;
  lastStep = -1;
}

function frame(ts) {
  if (t0 === null) { initPreset(ts); }

  const elapsed = (ts - t0) / 1000;
  const p       = PRESETS[pidx];

  if (phase === 'drawing') {
    /* Advance the stroke to wherever we should be by now. */
    const target = Math.min(
      Math.floor(elapsed / DRAW_SECS * par.steps),
      par.steps
    );
    if (target > lastStep) {
      ctx.beginPath();
      const from  = Math.max(lastStep, 0);
      const [mx, my] = ptAt(from, par);
      ctx.moveTo(mx, my);
      for (let i = from + 1; i <= target; i++) {
        const [x, y] = ptAt(i, par);
        ctx.lineTo(x, y);
      }
      ctx.stroke();
      lastStep = target;
    }
    /* Hold for HOLD_SECS after drawing completes, then begin fade. */
    if (elapsed >= DRAW_SECS + HOLD_SECS) {
      phase = 'fading';
      t0    = ts;
    }
  } else if (phase === 'fading') {
    /* Paint the background with increasing opacity to fade the curve out. */
    const alpha = Math.min(elapsed / FADE_SECS, 1);
    const [r, g, b] = hexRgb(p.bg);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    ctx.fillRect(0, 0, W, H);
    if (alpha >= 1) {
      pidx = (pidx + 1) % PRESETS.length;
      initPreset(ts);
    }
  }

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
