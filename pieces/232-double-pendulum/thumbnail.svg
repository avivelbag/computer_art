<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
  <rect width="300" height="300" fill="#08080e"/>

  <!-- Pivot point -->
  <circle cx="150" cy="48" r="4" fill="#252545"/>

  <!-- Arm suggestion (faint) -->
  <line x1="150" y1="48" x2="150" y2="130" stroke="#252545" stroke-width="1.5" opacity="0.5"/>

  <!-- Second arm suggestion -->
  <line x1="150" y1="130" x2="150" y2="190" stroke="#252545" stroke-width="1.2" opacity="0.35"/>

  <!-- 7 diverging colored trails, all starting near the common bob position (150,190) -->

  <!-- Red: sweeps right then down in a large arc -->
  <polyline
    points="150,190 162,196 174,206 183,218 188,232 187,247 181,260 170,268 158,270 145,265 135,255 129,242 128,228 132,216 140,208 151,204 162,203"
    stroke="hsl(0,90%,58%)" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.90"/>

  <!-- Orange: curves toward lower-right with wobble -->
  <polyline
    points="150,190 160,198 168,210 173,224 172,239 165,252 154,260 140,263 127,259 117,249 112,236 113,222 119,211 129,204 142,202"
    stroke="hsl(40,90%,58%)" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Yellow-green: goes lower-centre with slight left drift -->
  <polyline
    points="150,190 148,205 143,220 136,235 128,248 120,260 113,270 108,278 105,285 104,291"
    stroke="hsl(80,90%,55%)" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Green (reference): descends with widening spiral -->
  <polyline
    points="150,190 139,198 126,204 113,207 101,206 91,200 84,190 82,178 84,165 91,154 101,147 114,144 128,146 140,153 149,163 154,175 155,188"
    stroke="hsl(130,90%,52%)" stroke-width="2.2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>

  <!-- Cyan: large leftward sweep toward upper-left -->
  <polyline
    points="150,190 136,186 121,178 107,166 95,152 86,135 80,117 79,98 82,80 89,64 100,52 113,44 128,40 143,40 156,44"
    stroke="hsl(185,90%,55%)" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Blue: sweeps right and upward -->
  <polyline
    points="150,190 163,183 177,172 190,158 200,142 207,125 210,108 209,91 205,76 197,63 186,53 173,47 159,45 146,48"
    stroke="hsl(230,90%,65%)" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Violet: diverges sharply right and up -->
  <polyline
    points="150,190 166,188 181,183 195,174 207,162 216,148 221,132 222,116 220,101 214,88 205,77 194,70 182,66 170,67"
    stroke="hsl(280,90%,68%)" stroke-width="2" fill="none"
    stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>

  <!-- Bob dots at diverged endpoints -->
  <circle cx="162" cy="203" r="3.5" fill="hsl(0,90%,60%)"/>
  <circle cx="142" cy="202" r="3.5" fill="hsl(40,90%,60%)"/>
  <circle cx="104" cy="291" r="3.5" fill="hsl(80,90%,56%)"/>
  <circle cx="155" cy="188" r="3.5" fill="hsl(130,90%,54%)"/>
  <circle cx="156" cy="44" r="3.5" fill="hsl(185,90%,56%)"/>
  <circle cx="146" cy="48" r="3.5" fill="hsl(230,90%,65%)"/>
  <circle cx="170" cy="67" r="3.5" fill="hsl(280,90%,68%)"/>

  <!-- Label -->
  <text x="150" y="16" text-anchor="middle"
        font-family="system-ui,sans-serif" font-size="10" fill="rgba(200,169,110,0.55)"
        letter-spacing="0.08em">DOUBLE PENDULUM</text>
</svg>
