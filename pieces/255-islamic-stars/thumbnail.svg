<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150" width="200" height="150">
  <defs>
    <clipPath id="clip"><rect width="200" height="150"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="200" height="150" fill="#081818"/>

  <g clip-path="url(#clip)">

  <!-- Teal background squares for 8-fold grid: step=68, centred at (32,37),(100,37),(168,37),(32,113),(100,113),(168,113) -->
  <!-- Square half-side = 34 -->
  <rect x="-2"  y="3"  width="68" height="68" fill="#0d4040"/>
  <rect x="66"  y="3"  width="68" height="68" fill="#0d4040"/>
  <rect x="134" y="3"  width="68" height="68" fill="#0d4040"/>
  <rect x="-2"  y="79" width="68" height="68" fill="#0d4040"/>
  <rect x="66"  y="79" width="68" height="68" fill="#0d4040"/>
  <rect x="134" y="79" width="68" height="68" fill="#0d4040"/>

