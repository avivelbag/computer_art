  <line x1="134" y1="3"   x2="134" y2="147" stroke="#051010" stroke-width="1"/>
  <line x1="-2"  y1="71"  x2="202" y2="71"  stroke="#051010" stroke-width="1"/>

  <!-- 8-pointed star at (32, 37): R=28, r=11 -->
